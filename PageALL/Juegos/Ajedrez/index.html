<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez Premium | AcademiaCCED</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <style>
        :root {
            --color-primario: #e5322e;
            --color-fondo: #1a1a2e;
            --blanco: #ffffff;
            --dorado: #d4af37;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-fondo);
            color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Encabezado y Botón Volver */
        .encabezado {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .boton-volver {
            text-decoration: none;
            color: var(--blanco);
            font-weight: bold;
            border: 2px solid var(--color-primario);
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .boton-volver:hover {
            background: var(--color-primario);
            box-shadow: 0 0 15px var(--color-primario);
        }

        /* Contenedor del Juego */
        .contenedor-juego {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        #tablero {
            width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 5px solid #333;
            border-radius: 4px;
        }

        /* Panel de Información */
        .panel-info {
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-info h2 {
            color: var(--dorado);
            margin-top: 0;
        }

        .estado-juego {
            font-size: 1.1rem;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-left: 4px solid var(--color-primario);
        }

        .boton-reiniciar {
            width: 100%;
            background: var(--dorado);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .boton-reiniciar:hover {
            background: #fff;
            transform: scale(1.02);
        }

        /* Estilos para las piezas y casillas (Premium Look) */
        .white-1e1d7 { background-color: #f0d9b5; }
        .black-3c85d { background-color: #b58863; }

        @media (max-width: 600px) {
            #tablero { width: 90vw; }
            .panel-info { width: 90vw; }
        }
    </style>
</head>
<body>

    <header class="encabezado">
        <a href="/PageALL/Juegos/PanelJuegos.html" class="boton-volver">← VOLVER ATRAS</a>
        <h1 style="margin: 0; font-size: 1.5rem;">Ajedrez <span style="color: var(--color-primario);">CCED</span></h1>
    </header>

    <div class="contenedor-juego">
        <div id="tablero"></div>

        <div class="panel-info">
            <h2>Partida</h2>
            <div class="estado-juego" id="estado">
                Turno: Blancas
            </div>
            <p style="font-size: 0.9rem; color: #aaa;">Arrastra las piezas para mover. Las reglas de ajedrez se aplican automáticamente.</p>
            <button class="boton-reiniciar" onclick="reiniciarPartida()">REINICIAR TABLERO</button>
            
            <div style="margin-top: 30px;">
                <p style="font-size: 0.8rem; color: var(--dorado);">Biblioteca CCED - 2026</p>
            </div>
        </div>
    </div>

    <script>
        var tablero = null;
        var juego = new Chess();
        var $estado = $('#estado');

        function alSoltarPieza (origen, destino) {
            // Ver si el movimiento es legal
            var movimiento = juego.move({
                from: origen,
                to: destino,
                promotion: 'q' // Siempre promociona a reina por simplicidad
            });

            // Si es ilegal, devolver pieza
            if (movimiento === null) return 'snapback';

            actualizarEstado();
        }

        function actualizarEstado () {
            var status = '';
            var turno = (juego.turn() === 'w') ? 'Blancas' : 'Negras';

            if (juego.in_checkmate()) {
                status = '¡Jaque Mate! Ganador: ' + turno;
            } else if (juego.in_draw()) {
                status = 'Empate (Tablas)';
            } else {
                status = 'Turno: ' + (juego.turn() === 'w' ? 'Blancas' : 'Negras');
                if (juego.in_check()) {
                    status += ' (¡Jaque!)';
                }
            }

            $estado.html(status);
        }

        function reiniciarPartida() {
            juego.reset();
            tablero.start();
            actualizarEstado();
        }

                    // Agregamos la ruta de las imágenes para que se carguen desde internet
        var config = {
            draggable: true,
            position: 'start',
            onDrop: alSoltarPieza,
                  // ESTA LÍNEA ES LA QUE CARGA LAS PIEZAS:
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            moveSpeed: 'slow',
            snapbackSpeed: 500,
            snapSpeed: 100
        };

// Inicializar el tablero con la nueva configuración
tablero = Chessboard('tablero', config);
actualizarEstado();

// Esto hace que el tablero se adapte si cambias el tamaño de la ventana
$(window).resize(tablero.resize);

        tablero = Chessboard('tablero', config);
        actualizarEstado();

        // Ajustar tablero al tamaño de la ventana
        $(window).resize(tablero.resize);
    </script>

</body>
</html>
