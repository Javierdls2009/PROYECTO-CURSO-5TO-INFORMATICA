        /* ============================================================
           ESTILOS DEL SLIDER (Modificados para imágenes individuales)
           ============================================================ */
        .slider--teams {
            position: relative;
            margin: 80px auto; /* Espacio con el header */
            max-width: 750px;
            opacity: 0;
            display: none;
            /* Asegurar que no herede alineación de texto extraña */
            text-align: left; 
        }
        .slider--teams__team {
            position: relative;
            overflow: hidden;
        }
        #list {
            position: relative;
            backface-visibility: hidden;
            transform: translate3d(0,0,0);
            padding: 0;
            margin: 0;
            list-style: none;
        }
        #list li {
            position: relative;
            display: inline-block;
            float: left;
            text-align: center;
        }
        #list li figure {
            cursor: pointer;
            margin: 1em;
            opacity: 0.5;
            backface-visibility: hidden;
            transition: transform 450ms cubic-bezier(0.445, 0.050, 0.550, 0.950), opacity 450ms ease-in-out;
            transform: scale(0.5);
            border: none; /* Limpieza */
            padding: 0;
        }
        #list li figure.active {
            opacity: 1 !important;
            transform: scale(1) !important;
        }
        #list li figure:hover {
            opacity: 0.8;
            transform: scale(0.6);
        }

        /* Contenedor Rombo */
        #list li figure > div {
            border-radius: 5px;
            position: relative;
            margin: 2rem auto;
            width: 120px;
            height: 120px;
            overflow: hidden;
            transform: rotate(45deg);
            /* Eliminado el background antiguo */
            background: #ccc; /* Color de fondo por si falla la imagen */
        }

        /* Estilos para la NUEVA etiqueta <img> dentro del rombo */
        #list li figure > div img {
            display: block;
            width: 100%;
            height: 100%;
            /* Efecto "cover" para que la imagen llene el cuadrado sin deformarse */
            object-fit: cover; 
            /* Rotación inversa para que la foto se vea derecha */
            transform: rotate(-45deg) scale(1.42); /* scale corrige esquinas vacías al rotar */
        }

        #list li figcaption h2 { color: #333; font-size: 1.6rem; font-weight: 800; margin-bottom: 5px; margin-top: 0; }
        #list li figcaption p { color: #666; font-size: 0.9rem; font-weight: 400; margin: 0; }

    <script>
        var sliderTeam = (function(document, $) {
          'use strict';
          var $sliderTeams = $('.slider--teams'),
              $list = $('#list'),
              $listItems = $('#list li'),
              $nItems = $listItems.length,
              $nView = 3,
              autoSlider,
              $current = 0,
              $isAuto = true,
              $acAuto = 2500,
              
              _init = function() {
                _initWidth();
                _eventInit();
              },
              
              _initWidth = function() {
                $list.css({
                  'margin-left': ~~(100 / $nView) + '%',
                  'width': ~~(100 * ($nItems / $nView)) + '%'
                });
                $listItems.css('width', 100 / $nItems + '%');
                $sliderTeams.velocity({ opacity: 1 }, { display: "block" }, { delay:500 });
              },
              
              _eventInit = function() {
                window.requestAnimFrame = (function() {
                  return window.requestAnimationFrame || 
                         window.webkitRequestAnimationFrame || 
                         window.mozRequestAnimationFrame || 
                         function(callback){ window.setTimeout(callback, 1000 / 60); };
                })();

                window.requestInterval = function(fn, delay) {
                    var start = new Date().getTime(),
                    handle = new Object();
                    function loop() {
                        var current = new Date().getTime(),
                        delta = current - start;
                        if(delta >= delay) {
                            fn.call();
                            start = new Date().getTime();
                        }
                        handle.value = requestAnimFrame(loop);
                    };
                    handle.value = requestAnimFrame(loop);
                    return handle;
                }

                window.clearRequestInterval = function(handle) {
                    window.cancelAnimationFrame ? window.cancelAnimationFrame(handle.value) : clearInterval(handle);
                };
                
                $.each($listItems, function(i) {
                  var $this = $(this);
                  $this.on('touchstart click', function(e) {
                    e.preventDefault();
                    _stopMove(i);
                    _moveIt($this, i);
                  });
                });
                
                autoSlider = requestInterval(_autoMove, $acAuto);
              },
              
              _moveIt = function(obj, x) {
                var n = x;
                obj.find('figure').addClass('active');        
                $listItems.not(obj).find('figure').removeClass('active');
                
                $list.velocity({
                  translateX: ~~((-(100 / $nItems)) * n) + '%',
                  translateZ: 0
                }, {
                  duration: 1000,
                  easing: [400, 26],
                  queue: false
                });
              },
              
              _autoMove = function(currentSlide) {
                if ($isAuto) { 
                  $current = ~~(($current + 1) % $nItems);
                } else {
                  $current = currentSlide;
                }
                _moveIt($listItems.eq($current), $current);
              },
              
              _stopMove = function(x) {
                clearRequestInterval(autoSlider);
                $isAuto = false;
                _autoMove(x);
              };
          
          return { init: _init };
        })(document, jQuery);

        $(window).on('load', function(){
          sliderTeam.init();
        });
    </script>
