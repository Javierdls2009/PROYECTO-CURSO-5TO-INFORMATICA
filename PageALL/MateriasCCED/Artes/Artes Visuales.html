<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TITULO DE LA PESTAÑA: Cámbialo por el nombre de la materia -->
    <title>Artes Visuales | AcademiaCCED</title>
    <link rel="stylesheet" href="/PageALL/style_materias.css">
    <style>
        :root {
            /* COLOR PERSONALIZADO: Cambia este código hexadecimal (#...) 
               para darle un color único a cada asignatura (ej: Azul para Matemáticas) */
            --color-materia: #e5322e; 
            
            /* COLORES DE ESTRUCTURA: No suele ser necesario cambiarlos */
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
        }

        body { height: 100%; margin: 0; font-family: 'Segoe UI', Arial, sans-serif;
            
            background-color: var(--color-fondo);
            color: #333; overflow: hidden; }

        /* BARRA DE NAVEGACIÓN: Controla la parte superior de la pantalla */
        .nav-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid #ddd;
            height: 70px;
            position: sticky; /* Se queda fija al hacer scroll */
            top: 0;
            z-index: 1000;
        }

        /* ENLACE VOLVER: Estilo del botón de retroceso */
        .volver a {
            text-decoration: none;
            color: var(--color-materia);
            font-weight: bold;
        }

        /* TÍTULO PRINCIPAL: El nombre de la plataforma en la barra superior */
        .titulo-app {
            font-weight: 800;
            color: var(--color-materia);
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        /* CONTENEDOR FLEX: Divide la pantalla en Menú Lateral y Contenido */
        .contenedor-principal {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* SIDEBAR: Panel izquierdo donde van los temas */
        .sidebar {
            width: 280px;
            background: var(--blanco);
            border-right: 1px solid #ddd;
            padding: 25px;
            box-sizing: border-box;
            flex-shrink: 0; /* Evita que el menú se aplaste en pantallas pequeñas */
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--color-oscuro);
            border-left: 4px solid var(--color-materia); /* Línea decorativa del color de la materia */
            padding-left: 10px;
        }

        /* BOTONES DE TEMAS: Estilo de cada botón del menú */
        .btn-tema {
            width: 100%;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* EFECTO HOVER: Lo que pasa cuando pasas el ratón sobre un tema */
        .btn-tema:hover {
            background: var(--color-materia);
            color: white;
            transform: translateX(5px); /* Pequeño movimiento a la derecha */
        }

        /* VISOR DE CONTENIDO: El área grande donde se lee la información */
        .visor-contenido {
            flex: 1;
            padding: 60px;
            background: #fafbfc;
        }

        /* PIZARRA: El cuadro de texto centralizado */
        #pizarra {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease; /* Animación de aparición suave */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 2.5rem; color: var(--color-oscuro); margin-bottom: 15px; }
        p { line-height: 1.8; font-size: 1.1rem; color: #4a5568; }

        /* PIE DE PÁGINA */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
            background: var(--blanco);
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <!-- NAVEGACIÓN: Puedes cambiar el enlace de "href" para que vuelva a la página correcta -->
    <nav class="nav-superior">
        <div class="volver"><a href="./PanelGeneral.html">← REGRESAR ATRAS</a></div>
        <div class="titulo-app">Biblioteca CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <!-- MENÚ LATERAL: Aquí añades los botones para cada tema nuevo -->
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <!-- Para añadir un tema:
                     1. Copia la línea del botón.
                     2. Cambia el nombre (ej: "4. Nuevo Tema").
                     3. Cambia el ID en cargar('id_aqui'). Este ID debe ser igual al del Script abajo. -->
                <button class="btn-tema" onclick="cargar('tema1')">Dibujo</button>
                <button class="btn-tema" onclick="cargar('tema2')">Pintura</button>
                <button class="btn-tema" onclick="cargar('tema3')">Escultura</button>
                <button class="btn-tema" onclick="cargar('tema4')">Grabado</button>
                <button class="btn-tema" onclick="cargar('tema5')">Fotografía</button>
                <button class="btn-tema" onclick="cargar('tema6')">Ilustración</button>
                <button class="btn-tema" onclick="cargar('tema7')">Diseño gráfico</button>
                <button class="btn-tema" onclick="cargar('tema8')">Arte digital</button>
                <button class="btn-tema" onclick="cargar('tema9')">Arte urbano</button>
                <button class="btn-tema" onclick="cargar('tema10')">Murales</button>
                    <!-- Añade más temas aquí -->
            </div>
        </aside>

        <!-- ÁREA DE LECTURA: Aquí es donde el JavaScript "dibuja" la información -->
        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un tema de la izquierda para visualizar el material de estudio.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED - Desarrollado por Javier de los Santos
    </footer>

    <script>
        /**
         * FUNCIÓN CARGAR: Es la encargada de cambiar el texto de la pantalla.
         * @param {string} id - El identificador del tema que queremos mostrar.
         */
        function cargar(id) {
            const pizarra = document.getElementById("pizarra");

            /* BASE DE DATOS: Aquí guardas toda la información de la materia.
               Cada bloque (ej: 'tema1') debe tener su Título y su Texto. */
            const baseDeDatos = {
                'tema1': {
                    titulo: "Dibujo",
                    texto: "El dibujo es una forma de expresión artística que utiliza líneas para representar objetos, ideas o emociones. Es la base de muchas otras formas de arte y se puede realizar con diversos materiales como lápices, carboncillos o tintas."
                },
                'tema2': {
                    titulo: "Pintura",
                    texto: "La pintura es una disciplina artística que consiste en aplicar pigmentos sobre una superficie para crear una imagen. A lo largo de la historia, la pintura ha evolucionado a través de diferentes estilos y técnicas, desde el realismo hasta el arte abstracto."
                },
                'tema3': {
                    titulo: "Escultura",
                    texto: "La escultura es el arte de crear formas tridimensionales a través de la talla, modelado o ensamblaje de materiales como piedra, metal, madera o arcilla. Las esculturas pueden ser figurativas o abstractas y han sido una parte importante de la historia del arte."
                },
                    'tema4': {
                        titulo: "Grabado",
                        texto: "El grabado es una técnica artística que implica la incisión de una imagen en una superficie, generalmente una placa de metal, madera o linóleo. La imagen grabada se puede reproducir varias veces mediante la impresión, lo que ha permitido la difusión masiva del arte a lo largo de la historia."
                    },
                    'tema5': {
                        titulo: "Fotografía",
                        texto: "La fotografía es el arte y la técnica de capturar imágenes mediante la acción de la luz sobre una superficie sensible. Desde su invención en el siglo XIX, la fotografía ha revolucionado la forma en que percibimos y documentamos el mundo, convirtiéndose en una herramienta fundamental para el arte, el periodismo y la comunicación visual."
                    },
                    'tema6': {
                        titulo: "Ilustración",
                        texto: "La ilustración es el arte de crear imágenes para acompañar o complementar un texto. Se utiliza en libros, revistas, publicidad y medios digitales para comunicar ideas, contar historias o embellecer contenidos. Las ilustraciones pueden ser realistas o estilizadas, dependiendo del propósito y el estilo del artista."
                    },
                    'tema7': {
                        titulo: "Diseño gráfico",
                        texto: "El diseño gráfico es una disciplina creativa que combina arte y tecnología para comunicar mensajes visuales. Los diseñadores gráficos utilizan tipografía, color, imágenes y composición para crear logotipos, carteles, sitios web y otros materiales visuales que transmiten información de manera efectiva."
                    },
                    'tema8': {
                        titulo: "Arte digital",
                        texto: "El arte digital es una forma de expresión artística que utiliza tecnologías digitales como herramientas principales para crear obras de arte. Esto incluye desde ilustraciones digitales hasta animaciones y arte generativo, permitiendo a los artistas explorar nuevas posibilidades creativas en el mundo virtual."
                    },
                    'tema9': {
                        titulo: "Arte urbano",
                        texto: "El arte urbano es una manifestación artística que se desarrolla en espacios públicos. Incluye graffiti, murales y otras formas de expresión visual que interactúan con el entorno urbano. El arte urbano a menudo aborda temas sociales y políticos, convirtiéndose en una voz importante para las comunidades locales."
                    },
                    'tema10': {
                        titulo: "Murales",
                        texto: "Los murales son pinturas o obras de arte realizadas directamente sobre paredes u otras superficies grandes. A lo largo de la historia, los murales han sido utilizados para contar historias, expresar ideas políticas o simplemente embellecer espacios públicos. Artistas como Diego Rivera y Banksy han llevado el arte mural a un reconocimiento mundial."
                    }
                /* Para añadir más, solo pon una coma al final del anterior y crea el nuevo:
                'tema4': {
                    titulo: "Título del tema 4",
                    texto: "Texto del tema 4..."
                } 
                */
            };

            // Busca en la base de datos el ID que pulsamos en el botón
            const info = baseDeDatos[id];

            // Si el tema existe, lo inyecta en el HTML de la "pizarra"
            if (info) {
                pizarra.innerHTML = `
                    <h2>${info.titulo}</h2>
                    <p>${info.texto}</p>
                `;
            }
        }
    </script>
</body>
</html>
