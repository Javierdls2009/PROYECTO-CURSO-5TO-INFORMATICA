<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TITULO DE LA PESTAÑA: Cámbialo por el nombre de la materia -->
    <title>Elementos del Arte | AcademiaCCED</title>
    
    <style>
        :root {
            /* COLOR PERSONALIZADO: Cambia este código hexadecimal (#...) 
               para darle un color único a cada asignatura (ej: Azul para Matemáticas) */
            --color-materia: #e5322e; 
            
            /* COLORES DE ESTRUCTURA: No suele ser necesario cambiarlos */
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: var(--color-fondo);
            color: #333;
        }

        /* BARRA DE NAVEGACIÓN: Controla la parte superior de la pantalla */
        .nav-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid #ddd;
            height: 70px;
            position: sticky; /* Se queda fija al hacer scroll */
            top: 0;
            z-index: 1000;
        }

        /* ENLACE VOLVER: Estilo del botón de retroceso */
        .volver a {
            text-decoration: none;
            color: var(--color-materia);
            font-weight: bold;
        }

        /* TÍTULO PRINCIPAL: El nombre de la plataforma en la barra superior */
        .titulo-app {
            font-weight: 800;
            color: var(--color-materia);
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        /* CONTENEDOR FLEX: Divide la pantalla en Menú Lateral y Contenido */
        .contenedor-principal {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* SIDEBAR: Panel izquierdo donde van los temas */
        .sidebar {
            width: 280px;
            background: var(--blanco);
            border-right: 1px solid #ddd;
            padding: 25px;
            box-sizing: border-box;
            flex-shrink: 0; /* Evita que el menú se aplaste en pantallas pequeñas */
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--color-oscuro);
            border-left: 4px solid var(--color-materia); /* Línea decorativa del color de la materia */
            padding-left: 10px;
        }

        /* BOTONES DE TEMAS: Estilo de cada botón del menú */
        .btn-tema {
            width: 100%;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* EFECTO HOVER: Lo que pasa cuando pasas el ratón sobre un tema */
        .btn-tema:hover {
            background: var(--color-materia);
            color: white;
            transform: translateX(5px); /* Pequeño movimiento a la derecha */
        }

        /* VISOR DE CONTENIDO: El área grande donde se lee la información */
        .visor-contenido {
            flex: 1;
            padding: 60px;
            background: #fafbfc;
        }

        /* PIZARRA: El cuadro de texto centralizado */
        #pizarra {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease; /* Animación de aparición suave */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 2.5rem; color: var(--color-oscuro); margin-bottom: 15px; }
        p { line-height: 1.8; font-size: 1.1rem; color: #4a5568; }

        /* PIE DE PÁGINA */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
            background: var(--blanco);
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <!-- NAVEGACIÓN: Puedes cambiar el enlace de "href" para que vuelva a la página correcta -->
    <nav class="nav-superior">
        <div class="volver"><a href="../index.html">← REGRESAR</a></div>
        <div class="titulo-app">Biblioteca CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <!-- MENÚ LATERAL: Aquí añades los botones para cada tema nuevo -->
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <!-- Para añadir un tema:
                     1. Copia la línea del botón.
                     2. Cambia el nombre (ej: "4. Nuevo Tema").
                     3. Cambia el ID en cargar('id_aqui'). Este ID debe ser igual al del Script abajo. -->
                <button class="btn-tema" onclick="cargar('tema1')">Punto</button>
                <button class="btn-tema" onclick="cargar('tema2')">Línea</button>
                <button class="btn-tema" onclick="cargar('tema3')">Figura</button>
                <button class="btn-tema" onclick="cargar('tema4')">Espacio</button>
                <button class="btn-tema" onclick="cargar('tema5')">Textura</button>
                <button class="btn-tema" onclick="cargar('tema6')">Color</button>
                <button class="btn-tema" onclick="cargar('tema7')">Valor tonal</button>
                <button class="btn-tema" onclick="cargar('tema8')">Volumen</button>
                <button class="btn-tema" onclick="cargar('tema9')">Perspectiva</button>
                <button class="btn-tema" onclick="cargar('tema10')">Composición Visual</button>
                 <!-- Recuerda que cada tema debe tener un bloque en el Script de abajo con el mismo ID -->
            </div>
        </aside>

        <!-- ÁREA DE LECTURA: Aquí es donde el JavaScript "dibuja" la información -->
        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un tema de la izquierda para visualizar el material de estudio.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED - Desarrollado por Javier de los Santos
    </footer>

    <script>
        /**
         * FUNCIÓN CARGAR: Es la encargada de cambiar el texto de la pantalla.
         * @param {string} id - El identificador del tema que queremos mostrar.
         */
        function cargar(id) {
            const pizarra = document.getElementById("pizarra");

            /* BASE DE DATOS: Aquí guardas toda la información de la materia.
               Cada bloque (ej: 'tema1') debe tener su Título y su Texto. */
            const baseDeDatos = {
                'tema1': {
                    titulo: "Punto",
                    texto: "El punto es el elemento más básico del arte. No tiene dimensiones, solo posición. Es el inicio de toda creación visual y puede transmitir diferentes emociones dependiendo de su tamaño, color y ubicación."
                },
                'tema2': {
                    titulo: "Línea",
                    texto: "La línea es una sucesión de puntos que crea una dirección. Puede ser recta, curva, horizontal, vertical o diagonal. Las líneas pueden expresar movimiento, estabilidad o tensión en una obra de arte."
                },
                'tema3': {
                    titulo: "Figura",
                    texto: "La figura es una forma definida por líneas o por contraste de color. Puede ser geométrica (círculo, cuadrado) o orgánica (formas naturales). Las figuras son los bloques de construcción de las composiciones artísticas."
                },
                'tema4': {
                    titulo: "Espacio",
                    texto: "El espacio se refiere a la distancia o área entre, alrededor, por dentro o por fuera de los elementos de una obra. Puede ser positivo (ocupado por figuras) o negativo (vacío). El manejo del espacio crea profundidad y perspectiva."
                },
                'tema5': {
                    titulo: "Textura",
                    texto: "La textura es la calidad superficial de una obra que se puede percibir visualmente o al tacto. Puede ser real (textura táctil) o sugerida (textura visual). La textura añade interés y realismo a las obras de arte."
                },
                'tema6': {
                    titulo: "Color",
                    texto: "El color es un elemento fundamental que se percibe a través de la luz. Tiene propiedades como el tono, la saturación y el valor. El color puede evocar emociones, crear armonía o contraste en una obra."
                },
                'tema7': {
                    titulo: "Valor tonal",
                    texto: "El valor tonal se refiere a la claridad u oscuridad de un color. Es esencial para crear volumen, profundidad y contraste en una obra de arte. El manejo del valor tonal puede guiar la mirada del espectador y enfatizar ciertos elementos."
                },
                'tema8': {
                    titulo: "Volumen",
                    texto: "El volumen es la ilusión de tridimensionalidad en una obra de arte. Se puede crear a través del uso del valor tonal, la perspectiva y la superposición de elementos. El volumen da vida y realismo a las figuras."
                },
                'tema9': {
                    titulo: "Perspectiva",
                    texto: "La perspectiva es una técnica que permite representar objetos tridimensionales en una superficie bidimensional. Existen diferentes tipos de perspectiva, como la lineal, la atmosférica y la isométrica, cada una con sus propias reglas para crear profundidad."
                },
                'tema10': {
                    titulo: "Composición Visual",
                    texto: "La composición visual es la organización de los elementos dentro de una obra de arte. Incluye principios como el equilibrio, la proporción, el ritmo y la unidad. Una buena composición guía la mirada del espectador y crea una experiencia visual armoniosa."
                }
                /* Para añadir más, solo pon una coma al final del anterior y crea el nuevo:
                'tema4': {
                    titulo: "Título del tema 4",
                    texto: "Texto del tema 4..."
                } 
                */
            };

            // Busca en la base de datos el ID que pulsamos en el botón
            const info = baseDeDatos[id];

            // Si el tema existe, lo inyecta en el HTML de la "pizarra"
            if (info) {
                pizarra.innerHTML = `
                    <h2>${info.titulo}</h2>
                    <p>${info.texto}</p>
                `;
            }
        }
    </script>
</body>
</html>
