<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemáticas | AcademiaCCED</title>
    
    <!-- estilos propios de esta sola pagina -->
    <style>
        /* colores */
        :root {
            --color-principal: #e5322e;
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
        }

        /* estilos generales */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--color-fondo);
        }

        /* barra de navegacion superior */
        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--blanco);
            border-bottom: 2px solid #ddd;
        }

        /* boton volver */
        .boton-volver a {
            text-decoration: none;
            color: var(--color-principal);
            font-weight: bold;
            font-size: 1rem;
        }

        /* titulo de la materia */
        .titulo-materia {
            font-weight: 800;
            color: var(--color-principal);
            font-size: 1.5rem;
        }

        /* contenedor principal */
        .contenedor {
            display: flex;
            min-height: 100vh;
        }

        /*barra lateral con foto del profesor */
        .barra-lateral {
            width: 300px;
            background-color: var(--blanco);
            border-right: 1px solid #ddd;
            padding: 40px 20px;
            text-align: center;
        }

        /* foto profesor */
        .foto-profesor {
            width: 110px;
            height: 110px;
            background: #f0f0f0;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid var(--color-principal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        /* nombre profesor */
        .barra-lateral h3 {
            margin: 10px 0;
            color: var(--color-oscuro);
        }

        /* linea separadora */
        .barra-lateral hr {
            opacity: 0.2;
            margin: 20px 0;
        }

        /* informacion del profesor */
        .info-profesor {
            text-align: left;
            font-size: 0.9rem;
            color: #555;
        }

        .info-profesor p {
            margin: 10px 0;
        }

        /* zona principal */
        .zona-herramientas {
            flex: 1;
            padding: 50px;
            background-color: #f9f9fb;
        }

        /* encabezado en la zona */
        .zona-herramientas h2 {
            font-size: 2rem;
            color: var(--color-oscuro);
            margin: 0 0 10px 0;
        }

        .zona-herramientas p {
            color: #718096;
            margin: 0 0 40px 0;
        }

        /* grid de herramientas */
        .grid-herramientas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* cada tarjeta */
        .tarjeta-herramienta {
            background: var(--blanco);
            padding: 30px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            border: 1px solid #eee;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* efecto pasar el mouse */
        .tarjeta-herramienta:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--color-principal);
        }

        /* icono en la tarjeta */
        .icono {
            font-size: 2.5rem;
            color: var(--color-principal);
            margin-bottom: 10px;
        }

        /* titulo de la tarjeta */
        .tarjeta-herramienta h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: #333;
        }

        /* descripción de la tarjeta */
        .tarjeta-herramienta p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
        }

        /* pie de pagina */
        footer {
            text-align: center;
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 0.9rem;
        }
        .info-materia{
            text-align: left;
            font-size: 0.9rem;
            color: #555;
           
            margin: 10px 10px;
            padding: 10px;
        }
        .tema {
            padding: 10px;
            margin-bottom: 10px;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

    </style>
  


</head>
<body>

    <!-- barra superior -->
    <nav class="barra-superior">
         <div class="boton-volver"><a href="/PageALL/MateriasCCED/Ciencias Sociales/PanelGeneral.html">← VOLVER ATRAS</a></div>
        <div class="titulo-materia">CIENCIAS SOCIALES</div>
        <div style="color: #666; font-weight: bold;">5to Informática</div>
    </nav>

    <!-- contenido principal -->
    <div class="contenedor">
        
        <!-- barra lateral -->
        <aside class="barra-lateral">
            <h3>Civismo</h3>
            <hr>
    <div class="info-materia">
<div class="tema" onclick="mostrar('Tema1')">Civismo</div>
<br>
<div class="tema" onclick="mostrar('Tema2')">Valores cívicos</div>
<br>
<div class="tema" onclick="mostrar('Tema3')">Derechos</div>
<br>
<div class="tema" onclick="mostrar('Tema4')">Deberes</div>
<br>
<div class="tema" onclick="mostrar('Tema5')">Ciudadanía</div>
<br>
<div class="tema" onclick="mostrar('Tema6')">Normas de convivencia</div>
</div>
</aside>

<main class="zona-herramientas">
<div id="contenido">
<h2>Introducción a Civismo</h2>
<p>Selecciona un tema para aprender sobre cómo vivir en sociedad de manera responsable y respetuosa.</p>
</div>
</main>

<script>
function mostrar(tema) {
  const contenido = document.getElementById("contenido");

  if (tema === "Tema1") contenido.innerHTML = `
    <h2>Civismo</h2>
    <p><strong>Definición:</strong> Es la rama que estudia el comportamiento correcto de las personas dentro de la sociedad.</p>
    <p>El civismo promueve el respeto, la responsabilidad y la convivencia pacífica entre los ciudadanos.</p>
    <p><strong>Importancia:</strong> Permite que las personas vivan en armonía y respeten las normas sociales.</p>
  `;

  if (tema === "Tema2") contenido.innerHTML = `
    <h2>Valores cívicos</h2>
    <p>Son principios que guían el comportamiento en la sociedad.</p>
    <ul>
      <li><strong>Respeto:</strong> aceptar a los demás.</li>
      <li><strong>Responsabilidad:</strong> cumplir con obligaciones.</li>
      <li><strong>Solidaridad:</strong> ayudar a otros.</li>
      <li><strong>Honestidad:</strong> actuar con verdad.</li>
    </ul>
  `;

  if (tema === "Tema3") contenido.innerHTML = `
    <h2>Derechos</h2>
    <p>Son libertades que tienen todas las personas.</p>
    <ul>
      <li>Derecho a la educación</li>
      <li>Derecho a la libertad</li>
      <li>Derecho a la salud</li>
    </ul>
    <p>Los derechos deben ser respetados por todos.</p>
  `;

  if (tema === "Tema4") contenido.innerHTML = `
    <h2>Deberes</h2>
    <p>Son obligaciones que las personas deben cumplir.</p>
    <ul>
      <li>Respetar las leyes</li>
      <li>Respetar a los demás</li>
      <li>Cuidar el medio ambiente</li>
    </ul>
  `;

  if (tema === "Tema5") contenido.innerHTML = `
    <h2>Ciudadanía</h2>
    <p>Es la condición de pertenecer a una sociedad o país.</p>
    <p>Incluye derechos y deberes que permiten participar en la vida social y política.</p>
  `;

  if (tema === "Tema6") contenido.innerHTML = `
    <h2>Normas de convivencia</h2>
    <p>Son reglas que ayudan a mantener el orden y el respeto.</p>
    <ul>
      <li>Respetar turnos</li>
      <li>No interrumpir</li>
      <li>Ser amable</li>
    </ul>
  `;
}
</script>

</body>
</html>
