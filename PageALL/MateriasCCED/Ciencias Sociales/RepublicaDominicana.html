<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>República Dominicana | AcademiaCCED</title>
    
    <style>
        :root {
            /* CAMBIA EL COLOR AQUÍ SEGÚN LA MATERIA */
            --color-materia: #e5322e; 
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: var(--color-fondo);
            color: #333;
        }

        /* Barra de Navegación */
        .nav-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid #ddd;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .volver a {
            text-decoration: none;
            color: var(--color-materia);
            font-weight: bold;
        }

        .titulo-app {
            font-weight: 800;
            color: var(--color-materia);
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        /* Layout */
        .contenedor-principal {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--blanco);
            border-right: 1px solid #ddd;
            padding: 25px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--color-oscuro);
            border-left: 4px solid var(--color-materia);
            padding-left: 10px;
        }

        .lista-temas {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-tema {
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .btn-tema:hover {
            background: var(--color-materia);
            color: white;
            transform: translateX(5px);
        }

        /* Contenido */
        .visor-contenido {
            flex: 1;
            padding: 60px;
            background: #fafbfc;
        }

        #pizarra {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 2.5rem; color: var(--color-oscuro); margin-bottom: 15px; }
        p { line-height: 1.8; font-size: 1.1rem; color: #4a5568; }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
            background: var(--blanco);
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <nav class="nav-superior">
        <div class="volver"><a href="../index.html">← REGRESAR</a></div>
        <div class="titulo-app">Academia CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <!-- COPIA Y PEGA ESTA LINEA PARA AGREGAR MÁS TEMAS -->
                <button class="btn-tema" onclick="cargar('tema1')">Los Taínos</button>
                <button class="btn-tema" onclick="cargar('tema2')">Cacicazgos</button>
                <button class="btn-tema" onclick="cargar('tema3')">Periodos Precolombinos</button>
                <button class="btn-tema" onclick="cargar('tema4')">Llegada de los españoles</button>
                <button class="btn-tema" onclick="cargar('tema5')">Época colonial</button>
                <button class="btn-tema" onclick="cargar('tema6')">Dominación Haitiana</button>
                <button class="btn-tema" onclick="cargar('tema7')">La Independencia Nacional</button>
                <button class="btn-tema" onclick="cargar('tema8')">La Restauración</button>
                <button class="btn-tema" onclick="cargar('tema9')">El Siglo XX y Modernización</button>
                <button class="btn-tema" onclick="cargar('tema10')">Geografía</button>
                <button class="btn-tema" onclick="cargar('tema11')">Clima</button>
                <button class="btn-tema" onclick="cargar('tema12')">República Dominicana Actual</button>

            </div>
        </aside>

        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un tema de la izquierda para visualizar el material de estudio.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED. Todos los derechos reservados.
    </footer>

    <script>
        function cargar(id) {
            const pizarra = document.getElementById("pizarra");

            // --- AQUÍ EDITAS EL CONTENIDO DE CADA TEMA ---
            const baseDeDatos = {
                'tema1': {
                    titulo: "Introducción a la República Dominicana",
                    texto: "Aquí va la descripción del primer tema. Puedes usar etiquetas HTML como <b>negrita</b> o listas."
                },
                'tema2': {
                    titulo: "Historia de la República Dominicana",
                    texto: "Contenido detallado del segundo tema seleccionado."
                },
                'tema3': {
                    titulo: "Geografía y Demografía",
                    texto: "Descripción de las características geográficas y demográficas de la República Dominicana."
                },
                'tema4': {
                    titulo: "Llegada de los españoles",
                    texto: "Información sobre la llegada de los españoles a la República Dominicana."
                },
                'tema5': {
                    titulo: "Época colonial",
                    texto: "Detalles sobre la época colonial en la República Dominicana."
                },
                'tema6': {
                    titulo: "Dominación Haitiana",
                    texto: "Información sobre la dominación haitiana de la República Dominicana."
                },
                'tema7': {
                    titulo: "La Independencia Nacional",
                    texto: "Información sobre la independencia nacional de la República Dominicana."
                },
                'tema8': {
                    titulo: "La Restauración",
                    texto: "Detalles sobre el período de restauración en la República Dominicana."
                },
                'tema9': {
                    titulo: "El Siglo XX y Modernización",
                    texto: "Información sobre el siglo XX y el proceso de modernización en la República Dominicana."
                },
                'tema10': {
                    titulo: "Geografía",
                    texto: "Descripción de las características geográficas de la República Dominicana."
                },
                'tema11': {
                    titulo: "Clima",
                    texto: "Información sobre el clima de la República Dominicana."
                },
                'tema12': {
                    titulo: "República Dominicana Actual",
                    texto: "Descripción de la situación actual de la República Dominicana."
                }

            };

            const info = baseDeDatos[id];

            if (info) {
                pizarra.innerHTML = `
                    <h2>${info.titulo}</h2>
                    <p>${info.texto}</p>
                `;
            }
        }
    </script>
</body>
</html>
