<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica Deportiva | AcademiaCCED</title>
    <link rel="stylesheet" href="/PageALL/style_materias.css">
    <style>
        /* ========== ESTILOS BASE (Sincronizados) ========== */
        :root {
            --color-principal: #e5322e;
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
            --gris-borde: #ddd;
            --gris-claro: #f0f0f0;
            --texto-gris: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--color-fondo);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .barra-superior { display: flex; height: 74px;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid var(--gris-borde);
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .boton-volver a { text-decoration: none; color: var(--color-principal); font-weight: bold; font-size: 1rem; }
        .titulo-materia { font-weight: 800; color: var(--color-principal); font-size: 1.5rem; }

        .contenedor { display: flex; flex: 1; }

        .barra-lateral {
            width: 320px;
            background-color: var(--blanco);
            border-right: 1px solid var(--gris-borde);
            padding: 40px 20px;
            flex-shrink: 0;
        }

        .barra-lateral h3 {
            margin: 0 0 20px 0;
            color: var(--color-oscuro);
            font-size: 1.2rem;
            font-weight: bold;
            border-left: 4px solid var(--color-principal);
            padding-left: 12px;
        }

        .lista-temas { display: flex; flex-direction: column; gap: 6px; }

        .tema {
            padding: 12px 15px;
            background: var(--gris-claro);
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
            font-size: 0.95rem;
            color: #333;
            border-left: 3px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tema:hover { background: #ffe8e7; border-left-color: var(--color-principal); }

        /* ========== SUBMENÚ DESPLEGABLE ========== */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-left: 15px;
        }

        .submenu.open {
            max-height: 800px; 
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .subtema {
            padding: 10px 15px;
            background: #f9f9fb;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #555;
            transition: 0.2s;
            border-left: 2px solid transparent;
        }

        .subtema:hover { background: #f0f0f0; color: var(--color-principal); border-left-color: var(--color-principal); }

        /* Zona de Contenido */
        .zona-herramientas { flex: 1; padding: 50px; background-color: #f9f9fb;; height: 100%; }
        
        #contenido h2 { font-size: 2rem; color: var(--color-oscuro); margin: 0 0 15px 0; border-bottom: 3px solid var(--color-principal); display: inline-block; padding-bottom: 5px; }
        #contenido h3 { font-size: 1.4rem; color: var(--color-principal); margin: 25px 0 12px 0; font-weight: 700; }
        #contenido p { margin: 15px 0; line-height: 1.7; color: var(--texto-gris); font-size: 1rem; }
        #contenido ul { margin: 15px 0 20px 30px; color: var(--texto-gris); line-height: 1.7; }
        #contenido li { margin-bottom: 8px; }
        
        .bloque-ejemplo { background: #fef0ef; border-left: 5px solid var(--color-principal); padding: 20px; margin: 25px 0; border-radius: 8px; color: #2d2d2d; }
        .bloque-ejemplo strong { color: var(--color-principal); }

        footer { text-align: center; padding: 20px; background: white; border-top: 1px solid var(--gris-borde); color: #666; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .contenedor { flex-direction: column; }
            .barra-lateral { width: 100%; border-right: none; border-bottom: 1px solid var(--gris-borde); }
            .zona-herramientas { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <nav class="barra-superior">
        <div class="boton-volver"><a href="/PageALL/MateriasCCED/Educacion Fisica/PanelGeneral.html"> ← VOLVER ATRÁS</a></div>
        <div class="titulo-materia">PRÁCTICA DEPORTIVA</div>
        <div style="color: #666; font-weight: bold;">5to Informática</div>
    </nav>

    <div class="contenedor">
        <aside class="barra-lateral">
            <h3>Contenidos</h3>
            <div class="lista-temas">
                <div class="tema" onclick="mostrarTema('bienvenida')">Bienvenida</div>
                
                <div class="tema" onclick="toggleSubmenu()">Deportes <span id="flecha">▼</span></div>
                <div id="menu-deportes" class="submenu">
                    <div class="subtema" onclick="mostrarTema('futbol')">Fútbol</div>
                    <div class="subtema" onclick="mostrarTema('baloncesto')">Baloncesto</div>
                    <div class="subtema" onclick="mostrarTema('voleibol')">Voleibol</div>
                    <div class="subtema" onclick="mostrarTema('beisbol')">Béisbol</div>
                    <div class="subtema" onclick="mostrarTema('natacion')">Natación</div>
                </div>

                <div class="tema" onclick="mostrarTema('gimnasia')">Gimnasia</div>
                <div class="tema" onclick="mostrarTema('recreacion')">Recreación</div>
                <div class="tema" onclick="mostrarTema('expresion')">Expresión Corporal</div>
            </div>
        </aside>

        <main class="zona-herramientas">
            <div id="contenido"></div>
        </main>
    </div>

    <footer>
        <p>© 2026 AcademiaCCED · Práctica Deportiva y Expresión Motriz.</p>
    </footer>

    <script>
        const contenidos = {
            bienvenida: `
                <h2>Bienvenida</h2>
                <p>La práctica deportiva y la expresión motriz representan el eje fundamental de la Educación Física activa. En este módulo, exploraremos las diversas disciplinas que permiten al estudiante no solo desarrollar sus capacidades físicas, sino también fortalecer su identidad a través del movimiento coordinado.</p>
                <div class="bloque-ejemplo">
                    <strong>Enfoque:</strong> No se trata solo de competir, sino de entender la mecánica, las reglas y el impacto positivo que cada disciplina tiene en el desarrollo integral humano.
                </div>
                <h3>¿Qué aprenderás?</h3>
                <p>Analizaremos las técnicas específicas de deportes colectivos e individuales, la importancia de la recreación lúdica y cómo el cuerpo puede comunicarse mediante la expresión corporal y la gimnasia.</p>
            `,
            futbol: `
                <h2>Fútbol</h2>
                <p>Conocido como "el deporte rey", el fútbol es una disciplina colectiva que exige una alta resistencia aeróbica y una gran coordinación óculo-pédica.</p>
                <h3>Fundamentos Técnicos</h3>
                <ul>
                    <li><strong>El Conducción:</strong> Acción técnica que consiste en transportar el balón de una zona a otra del campo.</li>
                    <li><strong>El Pase:</strong> Elemento clave para el juego asociativo; puede ser corto, medio o largo.</li>
                    <li><strong>El Remate:</strong> Acción de enviar el balón hacia la portería contraria con el objetivo de marcar un gol.</li>
                </ul>
                <div class="bloque-ejemplo">
                    <strong>Curiosidad:</strong> El fútbol moderno nació en Inglaterra, pero sus raíces se remontan a juegos de pelota antiguos practicados en China y Mesoamérica.
                </div>
                <h3>Beneficios Específicos</h3>
                <p>Desarrolla la agilidad, mejora la potencia de las extremidades inferiores y fomenta la toma de decisiones bajo presión.</p>
            `,
            baloncesto: `
                <h2>Baloncesto</h2>
                <p>Es un deporte de ritmo dinámico que se juega en una cancha rectangular. Fue ideado por James Naismith en 1891 como una alternativa de bajo impacto físico para el invierno.</p>
                <h3>Reglas y Estructura</h3>
                <p>Se juega entre dos equipos de 5 jugadores. El objetivo es introducir el balón en el aro contrario, situado a una altura de 3.05 metros.</p>
                <ul>
                    <li><strong>Dobles:</strong> Falta que ocurre cuando un jugador bota el balón con ambas manos o vuelve a botar tras haber parado.</li>
                    <li><strong>Pasos:</strong> Caminar más de dos pasos sin botar el balón.</li>
                    <li><strong>Tiros Libres:</strong> Lanzamientos otorgados tras ciertas faltas, valen 1 punto.</li>
                </ul>
                <div class="bloque-ejemplo">
                    <strong>Estrategia:</strong> La coordinación entre el pase y el movimiento sin balón es lo que define a un equipo exitoso en baloncesto.
                </div>
            `,
            voleibol: `
                <h2>Voleibol</h2>
                <p>Deporte de red donde no existe el contacto físico directo entre oponentes, lo que lo convierte en una disciplina de alta precisión y reflejos.</p>
                <h3>Técnicas de Juego</h3>
                <ul>
                    <li><strong>Saque:</strong> El inicio de cada jugada; puede ser bajo o alto (tenis).</li>
                    <li><strong>Voleo:</strong> Golpe de dedos para colocar el balón con precisión al atacante.</li>
                    <li><strong>Golpe de Antebrazos:</strong> Utilizado principalmente para la recepción y defensa.</li>
                    <li><strong>Remate:</strong> Golpe seco y descendente para finalizar el punto.</li>
                </ul>
                <div class="bloque-ejemplo">
                    <strong>Regla Clave:</strong> Un mismo jugador no puede tocar el balón dos veces consecutivas, y el equipo tiene un máximo de tres toques.
                </div>
            `,
            beisbol: `
                <h2>Béisbol</h2>
                <p>Considerado el "pasatiempo nacional" en muchos países del Caribe, el béisbol es un deporte de alta estrategia y coordinación ojo-mano.</p>
                <h3>Posiciones en el Campo</h3>
                <p>El equipo defensivo se compone de 9 jugadores, incluyendo al lanzador (pitcher) y al receptor (catcher).</p>
                <ul>
                    <li><strong>Infield:</strong> Jugadores que cubren las bases y el campocorto.</li>
                    <li><strong>Outfield:</strong> Jardineros encargados de fildear pelotas largas.</li>
                </ul>
                <div class="bloque-ejemplo">
                    <strong>Objetivo:</strong> Un corredor debe tocar las cuatro bases en orden para anotar una carrera. Tres "outs" terminan la media entrada del equipo al bate.
                </div>
            `,
            natacion: `
                <h2>Natación</h2>
                <p>La natación es la habilidad de desplazarse en el agua mediante la propulsión muscular. Es recomendada mundialmente como el ejercicio más completo.</p>
                <h3>Estilos Principales</h3>
                <ul>
                    <li><strong>Crol (Libre):</strong> El estilo más rápido y común en competencias.</li>
                    <li><strong>Espalda:</strong> Único estilo donde la cara permanece fuera del agua constantemente.</li>
                    <li><strong>Braza (Pecho):</strong> El estilo más antiguo y estable.</li>
                    <li><strong>Mariposa:</strong> Requiere una coordinación perfecta entre el movimiento de brazos y la "patada de delfín".</li>
                </ul>
                <div class="bloque-ejemplo">
                    <strong>Beneficio:</strong> Al ser un deporte de bajo impacto, es ideal para la rehabilitación de lesiones y el fortalecimiento pulmonar.
                </div>
            `,
            gimnasia: `
                <h2>Gimnasia</h2>
                <p>La gimnasia busca el desarrollo armonioso del cuerpo mediante ejercicios que requieren fuerza, flexibilidad y control mental absoluto.</p>
                <h3>Ramas de la Gimnasia</h3>
                <ul>
                    <li><strong>Artística:</strong> Se realiza en aparatos como barras asimétricas, viga de equilibrio o suelo.</li>
                    <li><strong>Rítmica:</strong> Incorpora elementos de ballet y danza con el uso de aparatos (aro, cinta, maza).</li>
                </ul>
                <p>La práctica de la gimnasia desde la juventud mejora la postura, la disciplina y la conciencia corporal de forma excepcional.</p>
            `,
            recreacion: `
                <h2>Recreación</h2>
                <p>La recreación no es solo juego; es el proceso de renovación del espíritu y el cuerpo mediante actividades lúdicas durante el tiempo libre.</p>
                <div class="bloque-ejemplo">
                    <strong>Diferencia:</strong> Mientras que el deporte suele ser competitivo, la recreación busca el disfrute personal y la socialización sin la presión del resultado.
                </div>
                <h3>Tipos de Recreación</h3>
                <ul>
                    <li><strong>Activa:</strong> Senderismo, juegos de persecución, excursiones.</li>
                    <li><strong>Pasiva:</strong> Lectura, cine, juegos de mesa.</li>
                </ul>
            `,
            expresion: `
                <h2>Expresión Corporal</h2>
                <p>Es la forma más antigua de comunicación humana. Utiliza el cuerpo como un instrumento para proyectar ideas y sentimientos.</p>
                <h3>Elementos Fundamentales</h3>
                <p>En la expresión corporal se trabajan tres ejes principales:</p>
                <ul>
                    <li><strong>El Cuerpo:</strong> Conciencia de las articulaciones y músculos.</li>
                    <li><strong>El Espacio:</strong> Cómo nos movemos en el entorno (niveles alto, medio y bajo).</li>
                    <li><strong>El Tiempo:</strong> El ritmo y la velocidad del movimiento.</li>
                </ul>
                <div class="bloque-ejemplo">
                    <strong>Importancia:</strong> Ayuda a vencer la timidez y mejora la capacidad de oratoria y presencia frente al público.
                </div>
            `
        };

        function mostrarTema(temaId) {
            document.getElementById("contenido").innerHTML = contenidos[temaId];
        }

        function toggleSubmenu() {
            const menu = document.getElementById("menu-deportes");
            const flecha = document.getElementById("flecha");
            menu.classList.toggle("open");
            flecha.innerHTML = menu.classList.contains("open") ? "▲" : "▼";
        }

        mostrarTema('bienvenida');
    </script>
</body>
</html>
