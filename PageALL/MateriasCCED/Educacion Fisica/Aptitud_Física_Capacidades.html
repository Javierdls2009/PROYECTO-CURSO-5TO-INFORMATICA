<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptitud Física | AcademiaCCED</title>
    <style>
        /* ========== ESTILOS (Sincronizados con Lengua Española) ========== */
        :root {
            --color-principal: #e5322e;
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
            --gris-borde: #ddd;
            --gris-claro: #f0f0f0;
            --texto-gris: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { height: 100%; margin: 0; font-family: Arial, sans-serif;
            background-color: var(--color-fondo);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 74px); overflow: hidden; }

        /* BARRA SUPERIOR FIJA */
        .barra-superior { display: flex; height: 74px;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid var(--gris-borde);
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .boton-volver a {
            text-decoration: none;
            color: var(--color-principal);
            font-weight: bold;
            font-size: 1rem;
        }

        .titulo-materia {
            font-weight: 800;
            color: var(--color-principal);
            font-size: 1.5rem;
        }

        /* CONTENEDOR PRINCIPAL */
        .contenedor {
            display: flex;
            flex: 1;
        }

        .barra-lateral {
            width: 320px;
            background-color: var(--blanco);
            border-right: 1px solid var(--gris-borde);
            padding: 40px 20px;
            flex-shrink: 0;
        }

        .barra-lateral h3 {
            margin: 0 0 20px 0;
            color: var(--color-oscuro);
            font-size: 1.2rem;
            font-weight: bold;
            border-left: 4px solid var(--color-principal);
            padding-left: 12px;
        }

        .lista-temas {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tema {
            padding: 12px 15px;
            background: var(--gris-claro);
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
            font-size: 0.95rem;
            color: #333;
            border-left: 3px solid transparent;
        }

        .tema:hover {
            background: #ffe8e7;
            transform: translateX(4px);
            border-left-color: var(--color-principal);
        }

        /* ZONA DE CONTENIDO DINÁMICO */
        .zona-herramientas {
            flex: 1;
            padding: 50px;
            background-color: #f9f9fb;; height: 100%;
        }

        #contenido h2 {
            font-size: 2rem;
            color: var(--color-oscuro);
            margin: 0 0 15px 0;
            border-bottom: 3px solid var(--color-principal);
            display: inline-block;
            padding-bottom: 5px;
        }

        #contenido p {
            margin: 15px 0;
            line-height: 1.5;
            color: var(--texto-gris);
            font-size: 1rem;
        }

        #contenido ul {
            margin: 10px 0 20px 30px;
            color: var(--texto-gris);
            line-height: 1.5;
        }

        #contenido li {
            margin: 8px 0;
        }

        .bloque-ejemplo {
            background: #fef0ef;
            border-left: 5px solid var(--color-principal);
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 8px;
            color: #2d2d2d;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: white;
            border-top: 1px solid var(--gris-borde);
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .contenedor { flex-direction: column; }
            .barra-lateral { width: 100%; border-right: none; border-bottom: 1px solid var(--gris-borde); }
        }
    </style>
</head>
<body>
    <nav class="barra-superior">
        <div class="boton-volver"><a href="PanelGeneral.html"> ←  VOLVER ATRÁS</a></div>
        <div class="titulo-materia">APTITUD FÍSICA</div>
        <div style="color: #666; font-weight: bold;">5to Informática</div>
    </nav>

    <div class="contenedor">
        <aside class="barra-lateral">
            <h3>Contenidos</h3>
            <div class="lista-temas">
                <div class="tema" data-tema="bienvenida">Bienvenida</div>
                <div class="tema" data-tema="capacidades_basicas">Capacidades Físicas Básicas</div>
                <div class="tema" data-tema="coordinativas">Capacidades Coordinativas</div>
                <div class="tema" data-tema="metodologia">Metodología del entrenamiento</div>
            </div>
        </aside>

        <main class="zona-herramientas">
            <div id="contenido">
                </div>
        </main>
    </div>

    <footer>
        <p>© 2026 AcademiaCCED · Educación Física: Movimiento y Salud.</p>
    </footer>

    <script>
        const contenidos = {
            bienvenida: `
                <h2>Bienvenido</h2>
                <p>Selecciona un tema del menú lateral para visualizar el material de estudio sobre Aptitud Física.</p>
                <div class="bloque-ejemplo">
                    <strong>Información:</strong> Estas capacidades son la base del acondicionamiento físico e influyen directamente en la salud y el rendimiento deportivo.
                </div>
            `,
            capacidades_basicas: `
                <h2>Capacidades Físicas Básicas</h2>
                <p>Son las cualidades del cuerpo que permiten realizar actividades físicas con eficiencia. Se desarrollan mediante el entrenamiento y son fundamentales para la salud.</p>
                <ul>
                    <li><strong>Fuerza:</strong> Capacidad de los músculos para vencer o soportar una resistencia.</li>
                    <li><strong>Resistencia:</strong> Capacidad de mantener un esfuerzo físico durante un tiempo prolongado.</li>
                    <li><strong>Velocidad:</strong> Capacidad de realizar movimientos en el menor tiempo posible.</li>
                    <li><strong>Flexibilidad:</strong> Capacidad de mover las articulaciones con amplitud y elasticidad.</li>
                </ul>
            `,
            coordinativas: `
                <h2>Capacidades Coordinativas</h2>
                <p>Son habilidades que permiten controlar y coordinar los movimientos del cuerpo de manera precisa. Ayudan a mejorar la técnica y la agilidad.</p>
                <ul>
                    <li><strong>Equilibrio:</strong> Mantener la estabilidad del cuerpo.</li>
                    <li><strong>Coordinación:</strong> Combinar movimientos de forma ordenada.</li>
                    <li><strong>Agilidad:</strong> Cambiar de dirección o posición rápidamente.</li>
                    <li><strong>Ritmo:</strong> Realizar movimientos siguiendo una secuencia o tiempo.</li>
                </ul>
            `,
            metodologia: `
                <h2>Metodología del entrenamiento</h2>
                <p>Conjunto de métodos y principios utilizados para planificar y organizar el entrenamiento físico de forma segura y efectiva.</p>
                <div class="bloque-ejemplo">
                    <strong>Aspectos clave:</strong>
                    <ul>
                        <li>Intensidad y duración del entrenamiento.</li>
                        <li>Descanso y recuperación adecuada.</li>
                        <li>Evaluación constante del progreso físico.</li>
                    </ul>
                </div>
            `
        };

        function mostrarTema(temaId) {
            const contenedor = document.getElementById("contenido");
            if (contenidos[temaId]) {
                contenedor.innerHTML = contenidos[temaId];
            } else {
                contenedor.innerHTML = `<h2>Contenido no disponible</h2><p>Selecciona otro tema.</p>`;
            }
            // SE ELIMINÓ scrollIntoView PARA EVITAR QUE LA PÁGINA SALTE HACIA ABAJO
        }

        document.querySelectorAll('.tema').forEach(el => {
            el.addEventListener('click', () => {
                const temaId = el.getAttribute('data-tema');
                mostrarTema(temaId);
            });
        });

        // Carga inicial sin salto de scroll
        mostrarTema('bienvenida');
    </script>
</body>
</html>
