<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud y Prevención | AcademiaCCED</title>
    <link rel="stylesheet" href="/PageALL/style_materias.css">
    <style>
        /* ========== ESTILOS (Sincronizados con Lengua Española) ========== */
        :root {
            --color-principal: #e5322e;
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
            --gris-borde: #ddd;
            --gris-claro: #f0f0f0;
            --texto-gris: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { height: 100%; margin: 0; font-family: Arial, sans-serif;
            background-color: var(--color-fondo);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 74px); overflow: hidden; }

        /* BARRA SUPERIOR FIJA */
        .barra-superior { display: flex; height: 74px;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid var(--gris-borde);
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .boton-volver a {
            text-decoration: none;
            color: var(--color-principal);
            font-weight: bold;
            font-size: 1rem;
        }

        .titulo-materia {
            font-weight: 800;
            color: var(--color-principal);
            font-size: 1.5rem;
        }

        /* CONTENEDOR PRINCIPAL */
        .contenedor {
            display: flex;
            flex: 1;
        }

        .barra-lateral {
            width: 320px;
            background-color: var(--blanco);
            border-right: 1px solid var(--gris-borde);
            padding: 40px 20px;
            flex-shrink: 0;
        }

        .barra-lateral h3 {
            margin: 0 0 20px 0;
            color: var(--color-oscuro);
            font-size: 1.2rem;
            font-weight: bold;
            border-left: 4px solid var(--color-principal);
            padding-left: 12px;
        }

        .lista-temas {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tema {
            padding: 12px 15px;
            background: var(--gris-claro);
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
            font-size: 0.95rem;
            color: #333;
            border-left: 3px solid transparent;
        }

        .tema:hover {
            background: #ffe8e7;
            transform: translateX(4px);
            border-left-color: var(--color-principal);
        }

        /* ZONA DE CONTENIDO DINÁMICO */
        .zona-herramientas {
            flex: 1;
            padding: 50px;
            background-color: #f9f9fb;; height: 100%;
        }

        #contenido h2 {
            font-size: 2rem;
            color: var(--color-oscuro);
            margin: 0 0 15px 0;
            border-bottom: 3px solid var(--color-principal);
            display: inline-block;
            padding-bottom: 5px;
        }

        #contenido h3 {
            font-size: 1.5rem;
            color: var(--color-principal);
            margin: 25px 0 10px 0;
        }

        #contenido p {
            margin: 15px 0;
            line-height: 1.6;
            color: var(--texto-gris);
            font-size: 1rem;
        }

        #contenido ul {
            margin: 10px 0 20px 30px;
            color: var(--texto-gris);
            line-height: 1.6;
        }

        #contenido li {
            margin: 8px 0;
        }

        .bloque-ejemplo {
            background: #fef0ef;
            border-left: 5px solid var(--color-principal);
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 8px;
            color: #2d2d2d;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: white;
            border-top: 1px solid var(--gris-borde);
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .contenedor { flex-direction: column; }
            .barra-lateral { width: 100%; border-right: none; border-bottom: 1px solid var(--gris-borde); }
            .zona-herramientas { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <nav class="barra-superior">
        <div class="boton-volver"><a href="./PanelGeneral.html"> ←  REGRESAR ATRAS</a></div>
        <div class="titulo-materia">SALUD Y PREVENCIÓN</div>
        <div style="color: #666; font-weight: bold;">5to Informática</div>
    </nav>

    <div class="contenedor">
        <aside class="barra-lateral">
            <h3>Contenidos</h3>
            <div class="lista-temas">
                <div class="tema" data-tema="bienvenida">Bienvenida</div>
                <div class="tema" data-tema="tema1">Salud y Bienestar</div>
                <div class="tema" data-tema="tema2">Educación Postural</div>
                <div class="tema" data-tema="tema3">Prevención de Lesiones</div>
                <div class="tema" data-tema="tema4">Primeros Auxilios</div>
            </div>
        </aside>

        <main class="zona-herramientas">
            <div id="contenido">
                </div>
        </main>
    </div>

    <footer>
        <p>© 2026 AcademiaCCED · Salud, Seguridad y Prevención.</p>
    </footer>

    <script>
        const contenidos = {
            bienvenida: `
                <h2>Bienvenido</h2>
                <p>Selecciona un tema del menú lateral para explorar el material de estudio sobre salud y seguridad en la actividad física.</p>
                <div class="bloque-ejemplo">
                    <strong>Objetivo:</strong> Promover una vida activa y segura mediante el conocimiento de hábitos saludables y técnicas de prevención.
                </div>
            `,
            tema1: `
                <h2>Salud y Bienestar</h2>
                <p>La salud y el bienestar son conceptos relacionados con el equilibrio físico, mental, emocional y social. La salud no solo es la ausencia de enfermedad, sino el buen funcionamiento del cuerpo y la mente.</p>
                <h3>Hábitos para el Bienestar</h3>
                <ul>
                    <li><strong>Actividad Física:</strong> Realizar ejercicio regularmente.</li>
                    <li><strong>Alimentación:</strong> Mantener una dieta balanceada e hidratación constante.</li>
                    <li><strong>Descanso:</strong> Dormir las horas necesarias para la recuperación celular.</li>
                    <li><strong>Cuidado Emocional:</strong> Gestionar el estrés y fomentar relaciones positivas.</li>
                </ul>
            `,
            tema2: `
                <h2>Educación Postural</h2>
                <p>Conjunto de hábitos y técnicas que enseñan a mantener una postura correcta para prevenir dolores y deformaciones musculares o articulares.</p>
                <div class="bloque-ejemplo">
                    <strong>Importancia:</strong> Una buena postura mejora el rendimiento deportivo, favorece la circulación sanguínea y reduce el cansancio muscular.
                </div>
                <h3>Claves de la buena postura</h3>
                <ul>
                    <li>Forma correcta de sentarse frente al computador.</li>
                    <li>Técnica segura para levantar objetos pesados.</li>
                    <li>Posición adecuada de la columna al caminar o dormir.</li>
                </ul>
            `,
            tema3: `
                <h2>Prevención de Lesiones</h2>
                <p>Consiste en aplicar medidas para evitar daños físicos producidos por movimientos incorrectos o exceso de esfuerzo durante el ejercicio.</p>
                <h3>Medidas Preventivas</h3>
                <ul>
                    <li><strong>Calentamiento:</strong> Preparar los músculos antes de la intensidad.</li>
                    <li><strong>Técnica:</strong> Realizar los ejercicios con el movimiento biomecánico correcto.</li>
                    <li><strong>Equipo:</strong> Usar calzado y ropa deportiva adecuados.</li>
                    <li><strong>Límites:</strong> Respetar la capacidad física del cuerpo sin forzar en exceso.</li>
                </ul>
            `,
            tema4: `
                <h2>Primeros Auxilios</h2>
                <p>Es la atención inmediata y temporal que se brinda a una persona lesionada antes de recibir ayuda médica profesional. Su fin es proteger la vida y evitar complicaciones.</p>
                <div class="bloque-ejemplo">
                    <strong>Regla Básica:</strong> Mantener la calma y evaluar el estado de la persona antes de actuar.
                </div>
                <h3>Acciones Básicas</h3>
                <ul>
                    <li>Llamar a los servicios de emergencia (911).</li>
                    <li>Controlar hemorragias leves con presión.</li>
                    <li>Inmovilizar posibles fracturas o esguinces.</li>
                    <li>Mantener estable y cómoda a la persona afectada.</li>
                </ul>
            `
        };

        function mostrarTema(temaId) {
            const contenedor = document.getElementById("contenido");
            if (contenidos[temaId]) {
                contenedor.innerHTML = contenidos[temaId];
            } else {
                contenedor.innerHTML = `<h2>Contenido no disponible</h2><p>Selecciona otro tema.</p>`;
            }
        }

        document.querySelectorAll('.tema').forEach(el => {
            el.addEventListener('click', () => {
                const temaId = el.getAttribute('data-tema');
                mostrarTema(temaId);
            });
        });

        // Carga inicial
        mostrarTema('bienvenida');
    </script>
</body>
</html>
