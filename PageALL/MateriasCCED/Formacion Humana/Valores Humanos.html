<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valores Humanos | AcademiaCCED</title>
    
    <style>
        :root {
            --color-materia: #e5322e; 
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: var(--color-fondo);
            color: #333;
        }

        .nav-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid #ddd;
            height: 70px;
            position: sticky; 
            top: 0;
            z-index: 1000;
        }

        .volver a {
            text-decoration: none;
            color: var(--color-materia);
            font-weight: bold;
        }

        .titulo-app {
            font-weight: 800;
            color: var(--color-materia);
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .contenedor-principal {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            width: 280px;
            background: var(--blanco);
            border-right: 1px solid #ddd;
            padding: 25px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--color-oscuro);
            border-left: 4px solid var(--color-materia); 
            padding-left: 10px;
        }

        .btn-tema {
            width: 100%;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .btn-tema:hover {
            background: var(--color-materia);
            color: white;
            transform: translateX(5px); 
        }

        .visor-contenido {
            flex: 1;
            padding: 60px;
            background: #fafbfc;
        }

        #pizarra {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 2.5rem; color: var(--color-oscuro); margin-bottom: 15px; }
        p { line-height: 1.8; font-size: 1.1rem; color: #4a5568; }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
            background: var(--blanco);
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <nav class="nav-superior">
        <div class="volver"><a href="PanelGeneral.html">← REGRESAR</a></div>
        <div class="titulo-app">Biblioteca CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <button class="btn-tema" onclick="cargar('valores_humanos')">Valores Humanos</button>
                <button class="btn-tema" onclick="cargar('etica')">Ética</button>
                <button class="btn-tema" onclick="cargar('moral')">Moral</button>
                <button class="btn-tema" onclick="cargar('justicia')">Justicia</button>
                <button class="btn-tema" onclick="cargar('igualdad')">Igualdad</button>
                <button class="btn-tema" onclick="cargar('derechos_humanos')">Derechos Humanos</button>
            </div>
        </aside>

        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido a Valores Humanos</h2>
                <p>Selecciona un tema de la izquierda para explorar los diferentes aspectos y la importancia de los valores humanos en nuestra vida diaria y en la sociedad.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED. Todos los derechos reservados.
    </footer>

    <script>
        function cargar(id) {
            const pizarra = document.getElementById("pizarra");

            const baseDeDatos = {
                'valores_humanos': {
                    titulo: "Valores Humanos",
                    texto: "Los valores humanos son principios fundamentales que orientan el comportamiento y las decisiones de las personas. Entre ellos destacan el respeto, la honestidad, la responsabilidad, la solidaridad y la tolerancia. Estos valores permiten una convivencia armoniosa y fortalecen las relaciones interpersonales. Se aprenden principalmente en la familia, la escuela y la comunidad. Son esenciales para la formación del carácter y la construcción de una ciudadanía responsable. Una sociedad basada en valores es más justa, pacífica y equitativa."
                },
                'etica': {
                    titulo: "Ética",
                    texto: "La ética es la disciplina filosófica que estudia la moral y reflexiona sobre lo que está bien y lo que está mal. Ayuda a las personas a actuar con responsabilidad, justicia y honestidad. No impone normas, sino que invita a pensar antes de actuar. La ética está presente en todas las áreas de la vida, desde las relaciones personales hasta el ejercicio profesional. Favorece la toma de decisiones correctas y el respeto hacia los demás. Es una herramienta indispensable para vivir con integridad."
                },
                'moral': {
                    titulo: "Moral",
                    texto: "La moral es el conjunto de normas, costumbres y valores que una sociedad considera correctos. Estas reglas orientan el comportamiento de las personas en su vida diaria. La moral se aprende en la familia, la escuela y el entorno social. Puede variar según la cultura, la época y las tradiciones de cada pueblo. Su función es promover la convivencia, el respeto y el bienestar colectivo. Junto con la ética, constituye la base de una conducta responsable."
                },
                'justicia': {
                    titulo: "Justicia",
                    texto: "La justicia consiste en dar a cada persona lo que le corresponde según sus derechos y méritos. Es uno de los valores más importantes en toda sociedad democrática. Garantiza la igualdad ante la ley y protege la dignidad humana. La justicia combate la discriminación, el abuso y la impunidad. Permite resolver conflictos de manera equitativa y pacífica. Sin justicia, no puede existir una convivencia verdaderamente armoniosa."
                },
                'igualdad': {
                    titulo: "Igualdad",
                    texto: "La igualdad es el principio que establece que todas las personas poseen los mismos derechos, oportunidades y dignidad. Significa que nadie debe ser discriminado por su origen, género, religión o condición social. La igualdad promueve la inclusión y la participación de todos en la vida social y política. Es un pilar fundamental de la democracia y los derechos humanos. Favorece una sociedad más justa y solidaria. Respetar la igualdad es reconocer el valor de cada ser humano."
                },
                'derechos_humanos': {
                    titulo: "Derechos Humanos",
                    texto: "Los derechos humanos son libertades y garantías inherentes a todas las personas por el simple hecho de existir. Protegen la vida, la libertad, la educación, la salud y la dignidad humana. Son universales, inalienables e indivisibles. Ninguna autoridad puede eliminarlos arbitrariamente. Constituyen la base de la justicia, la paz y la convivencia democrática. Su respeto es esencial para el desarrollo integral de toda sociedad."
                }
            };

            const info = baseDeDatos[id];

            if (info) {
                pizarra.innerHTML = `
                    <h2>${info.titulo}</h2>
                    <p>${info.texto}</p>
                `;
            }
        }
    </script>
</body>
</html>
