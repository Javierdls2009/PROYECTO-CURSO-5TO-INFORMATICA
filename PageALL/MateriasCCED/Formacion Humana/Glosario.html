<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosario | AcademiaCCED</title>
    
    <style>
        :root {
            --color-materia: #e5322e; 
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: var(--color-fondo);
            color: #333;
        }

        .nav-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid #ddd;
            height: 70px;
            position: sticky; 
            top: 0;
            z-index: 1000;
        }

        .volver a {
            text-decoration: none;
            color: var(--color-materia);
            font-weight: bold;
        }

        .titulo-app {
            font-weight: 800;
            color: var(--color-materia);
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .contenedor-principal {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            width: 280px;
            background: var(--blanco);
            border-right: 1px solid #ddd;
            padding: 25px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--color-oscuro);
            border-left: 4px solid var(--color-materia); 
            padding-left: 10px;
        }

        .btn-tema {
            width: 100%;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .btn-tema:hover {
            background: var(--color-materia);
            color: white;
            transform: translateX(5px); 
        }

        .visor-contenido {
            flex: 1;
            padding: 60px;
            background: #fafbfc;
        }

        #pizarra {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 2.5rem; color: var(--color-oscuro); margin-bottom: 15px; }
        p { line-height: 1.8; font-size: 1.1rem; color: #4a5568; }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
            background: var(--blanco);
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <nav class="nav-superior">
        <div class="volver"><a href="PanelGeneral.html">← REGRESAR</a></div>
        <div class="titulo-app">Biblioteca CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <button class="btn-tema" onclick="cargar('etica')">1. Ética</button>
                <button class="btn-tema" onclick="cargar('moral')">2. Moral</button>
                <button class="btn-tema" onclick="cargar('valor')">3. Valor</button>
                <button class="btn-tema" onclick="cargar('respeto')">4. Respeto</button>
                <button class="btn-tema" onclick="cargar('responsabilidad')">5. Responsabilidad</button>
                <button class="btn-tema" onclick="cargar('justicia')">6. Justicia</button>
                <button class="btn-tema" onclick="cargar('igualdad')">7. Igualdad</button>
                <button class="btn-tema" onclick="cargar('solidaridad')">8. Solidaridad</button>
                <button class="btn-tema" onclick="cargar('autoestima')">9. Autoestima</button>
                <button class="btn-tema" onclick="cargar('ciudadania')">10. Ciudadanía</button>
            </div>
        </aside>

        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Glosario de Formación Humana</h2>
                <p>Selecciona un término de la izquierda para ver su significado.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED. Todos los derechos reservados.
    </footer>

    <script>
        function cargar(id) {
            const pizarra = document.getElementById("pizarra");

            const baseDeDatos = {
                'etica': {
                    titulo: "1. Ética",
                    texto: "Disciplina filosófica que estudia la conducta humana y determina qué acciones son correctas o incorrectas. La ética orienta nuestras decisiones, promueve la justicia y fortalece la convivencia social. Es fundamental en la vida personal, académica y profesional."
                },
                'moral': {
                    titulo: "2. Moral",
                    texto: "Conjunto de normas, valores y costumbres que una sociedad considera adecuados. La moral guía el comportamiento diario y ayuda a distinguir entre el bien y el mal. Se aprende en la familia, la escuela y la comunidad."
                },
                'valor': {
                    titulo: "3. Valor",
                    texto: "Principio o cualidad que orienta la conducta humana hacia acciones positivas. Los valores, como la honestidad y el respeto, son esenciales para la convivencia y el desarrollo personal. Constituyen la base del carácter."
                },
                'respeto': {
                    titulo: "4. Respeto",
                    texto: "Reconocimiento del valor, la dignidad y los derechos de todas las personas. Implica aceptar las diferencias, escuchar opiniones y tratar a los demás con cortesía. Es indispensable para una convivencia armoniosa."
                },
                'responsabilidad': {
                    titulo: "5. Responsabilidad",
                    texto: "Capacidad de cumplir con los deberes y asumir las consecuencias de las propias acciones. Una persona responsable actúa con compromiso, puntualidad y seriedad. Este valor fortalece la confianza y la disciplina."
                },
                'justicia': {
                    titulo: "6. Justicia",
                    texto: "Principio que busca dar a cada persona lo que le corresponde. Promueve la igualdad, la equidad y el respeto a los derechos. Es uno de los pilares fundamentales de la convivencia democrática."
                },
                'igualdad': {
                    titulo: "7. Igualdad",
                    texto: "Derecho de todas las personas a recibir el mismo trato y tener las mismas oportunidades. Rechaza cualquier forma de discriminación. Favorece una sociedad inclusiva y equitativa."
                },
                'solidaridad': {
                    titulo: "8. Solidaridad",
                    texto: "Valor que impulsa a ayudar y apoyar a quienes lo necesitan. Fortalece la unión, la cooperación y el compromiso social. Es esencial para construir comunidades más humanas y justas."
                },
                'autoestima': {
                    titulo: "9. Autoestima",
                    texto: "Valoración y aprecio que una persona tiene de sí misma. Una autoestima saludable fortalece la confianza, la seguridad y el bienestar emocional. Es clave para el crecimiento personal."
                },
                'ciudadania': {
                    titulo: "10. Ciudadanía",
                    texto: "Condición que convierte a una persona en miembro activo de una nación. Implica derechos, deberes y participación responsable en la vida social y política. Es fundamental para la democracia."
                }
            };

            const info = baseDeDatos[id];

            if (info) {
                pizarra.innerHTML = `
                    <h2>${info.titulo}</h2>
                    <p>${info.texto}</p>
                `;
            }
        }
    </script>
</body>
</html>
