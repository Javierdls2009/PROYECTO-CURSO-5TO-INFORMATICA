<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TITULO DE LA PESTAÑA: Cámbialo por el nombre de la materia -->
    <title>NombreMateria | AcademiaCCED</title>
    
    <style>
    :root {
        --color-materia: #e5322e;
        --color-fondo: #f3f6ff;
        --color-oscuro: #1a1a2e;
        --blanco: #ffffff;
        --gris-borde: #ddd;
        --gris-claro: #f0f0f0;
        --texto-gris: #555;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: var(--color-fondo);
        color: #333;
    }

    /* ===== NAVBAR ===== */
    .nav-superior {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 5%;
        background: var(--blanco);
        border-bottom: 2px solid var(--gris-borde);
        position: sticky;
        top: 0;
        z-index: 1000;
        flex-wrap: wrap;
    }

    .volver a {
        text-decoration: none;
        color: var(--color-materia);
        font-weight: bold;
        font-size: 1rem;
    }

    .titulo-app {
        font-weight: 800;
        color: var(--color-materia);
        font-size: 1.5rem;
        text-transform: uppercase;
    }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .contenedor-principal {
        display: flex;
        min-height: calc(100vh - 70px);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
        width: 320px;
        background-color: var(--blanco);
        border-right: 1px solid var(--gris-borde);
        padding: 40px 20px;
        flex-shrink: 0;
    }

    .sidebar h3 {
        margin: 0 0 20px 0;
        color: var(--color-oscuro);
        font-size: 1.2rem;
        font-weight: bold;
        border-left: 4px solid var(--color-materia);
        padding-left: 12px;
    }

    .lista-temas {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    /* ===== BOTONES ===== */
    .btn-tema {
        width: 100%;
        padding: 12px 15px;
        background: var(--gris-claro);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-align: left;
        transition: 0.25s ease;
        font-size: 0.95rem;
        color: #333;
        border-left: 3px solid transparent;
    }

    .btn-tema:hover {
        background: #ffe8e7;
        transform: translateX(4px);
        border-left-color: var(--color-materia);
        color: #000;
    }

    /* ===== CONTENIDO ===== */
    .visor-contenido {
        flex: 1;
        padding: 50px;
        background-color: #f9f9fb;
        overflow-y: auto;
    }

    /* ===== PIZARRA ===== */
    #pizarra {
        max-width: 900px;
        margin: 0 auto;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    #pizarra h2 {
        font-size: 2rem;
        color: var(--color-oscuro);
        margin-bottom: 15px;
        border-bottom: 3px solid var(--color-materia);
        display: inline-block;
        padding-bottom: 5px;
    }

    #pizarra p {
        margin: 15px 0;
        line-height: 1.7;
        color: var(--texto-gris);
        font-size: 1rem;
    }

    #pizarra b {
        color: var(--color-oscuro);
    }

    /* ===== BLOQUES DESTACADOS ===== */
    .bloque-ejemplo {
        background: #fef0ef;
        border-left: 5px solid var(--color-materia);
        padding: 15px 20px;
        margin: 20px 0;
        border-radius: 8px;
        color: #2d2d2d;
    }

    hr {
        margin: 20px 0;
        border: 0;
        height: 1px;
        background: linear-gradient(to right, var(--color-materia), transparent);
    }

    /* ===== FOOTER ===== */
    footer {
        text-align: center;
        padding: 20px;
        background: white;
        border-top: 1px solid var(--gris-borde);
        color: #666;
        font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {

        .contenedor-principal {
            flex-direction: column;
        }

        .sidebar {
            width: 100%;
            border-right: none;
            border-bottom: 1px solid var(--gris-borde);
        }

        .visor-contenido {
            padding: 25px;
        }

        .titulo-app {
            font-size: 1.2rem;
        }
    }
    #pizarra b {
    color: #e5322e;
}
</style>
</head>
<body>

    <!-- NAVEGACIÓN: Puedes cambiar el enlace de "href" para que vuelva a la página correcta -->
    <nav class="nav-superior">
        <div class="volver"><a href="PanelGeneral.html">← REGRESAR</a></div>
        <div class="titulo-app">Academia CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <!-- MENÚ LATERAL: Aquí añades los botones para cada tema nuevo -->
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <!-- Para añadir un tema:
                     1. Copia la línea del botón.
                     2. Cambia el nombre (ej: "4. Nuevo Tema").
                     3. Cambia el ID en cargar('id_aqui'). Este ID debe ser igual al del Script abajo. -->
<button class="btn-tema" onclick="cargar('tema1')">🔗 Verbos frasales</button>
<button class="btn-tema" onclick="cargar('tema2')">🛠️ Como usarlos</button>
<button class="btn-tema" onclick="cargar('tema3')">🎯 Aplicación Práctica</button>
            </div>
        </aside>

        <!-- ÁREA DE LECTURA: Aquí es donde el JavaScript "dibuja" la información -->
        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un tema de la izquierda para visualizar el material de estudio.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED - Desarrollado por Javier de los Santos
    </footer>

    <script>
        /**
         * FUNCIÓN CARGAR: Es la encargada de cambiar el texto de la pantalla.
         * @param {string} id - El identificador del tema que queremos mostrar.
         */
        function cargar(id) {
            const pizarra = document.getElementById("pizarra");

            /* BASE DE DATOS: Aquí guardas toda la información de la materia.
               Cada bloque (ej: 'tema1') debe tener su Título y su Texto. */
            const baseDeDatos = {
                'tema1': {
                    titulo: "Los verbos frasales en inglés",
                    texto: `<b>Los verbos frasales </b>(phrasal verbs) en inglés son combinaciones de un verbo base con una preposición o adverbio, lo que cambia o intensifica el significado original del verbo. Ejemplos clave incluyen break down (averiarse), give up (rendirse), y look into (investigar). Son esenciales para la fluidez en conversaciones diarias y a menudo equivalen a verbos más formales. 
`
                },
                'tema2': {
                    titulo: "Cómo usar los verbos frasales(Ejemplos)",
                    texto: `<b>Get over:</b> Superar/recuperarse (e.g., I can't get over my shyness - No puedo superar mi timidez).
<br><br><b>Give up:</b> Abandonar/dejar un hábito (e.g., Give up smoking - Deja de fumar).
<br><br><b>Look for:</b> Buscar (e.g., I'm looking for my keys - Estoy buscando mis llaves).
<br><br><b>Turn on/off:</b> Encender/apagar (e.g., Turn off the light - Apaga la luz).
<br><br><b>Go on:</b> Continuar (e.g., Please, go on with your story - Por favor, continúa con tu historia).
<br><br><b>Find out:</b> Descubrir (e.g., We will find out the truth - Descubriremos la verdad).`
                },
                'tema3': {
                    titulo: "Caracteristicas claves de los verbos frasales",
                    texto: `<br><br><b>Transitivos:</b> Necesitan un objeto directo (e.g., Turn off the TV).
<br><br><b>Intransitivos:</b> No necesitan objeto directo (e.g., The car broke down).
<br><br><b>Separables: </b>El objeto puede ir entre el verbo y la partícula (e.g., Turn it off).
<br><br><b>Inseparables: </b>El verbo y la partícula deben ir juntos (e.g., Look after - cuidar). `
                }
                /* Para añadir más, solo pon una coma al final del anterior y crea el nuevo:
                'tema4': {
                    titulo: "Título del tema 4",
                    texto: "Texto del tema 4..."
                } 
                */
            };

            // Busca en la base de datos el ID que pulsamos en el botón
            const info = baseDeDatos[id];

            // Si el tema existe, lo inyecta en el HTML de la "pizarra"
            if (info) {
                pizarra.innerHTML = `
                    <h2>${info.titulo}</h2>
                    <p>${info.texto}</p>
                `;
            }
        }
    </script>
</body>
</html> usen ese codigo base para los subtema de las materias
