<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TITULO DE LA PESTAÑA: Cámbialo por el nombre de la materia -->
<title>Ingles | AcademiaCCED</title>    
<style>
:root {
    --color-materia: #e5322e;
    --color-fondo: #f3f6ff;
    --color-oscuro: #1a1a2e;
    --blanco: #ffffff;
    --gris-borde: #ddd;
    --gris-claro: #f0f0f0;
    --texto-gris: #555;
}

/* ===== BASE ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: var(--color-fondo);
    color: #333;
}

/* ===== NAV ===== */
.nav-superior {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
    background: var(--blanco);
    border-bottom: 2px solid var(--gris-borde);
    position: sticky;
    top: 0;
    z-index: 1000;
    flex-wrap: wrap;
}

.volver a {
    text-decoration: none;
    color: var(--color-materia);
    font-weight: bold;
}

.titulo-app {
    font-weight: 800;
    color: var(--color-materia);
    font-size: 1.5rem;
    text-transform: uppercase;
}

/* ===== LAYOUT ===== */
.contenedor-principal {
    display: flex;
    min-height: calc(100vh - 70px);
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 320px;
    background-color: var(--blanco);
    border-right: 1px solid var(--gris-borde);
    padding: 50px 25px;
}

.sidebar h3 {
    margin-bottom: 25px;
    color: var(--color-oscuro);
    border-left: 4px solid var(--color-materia);
    padding-left: 12px;
}

/* LISTA DE TEMAS */
.lista-temas {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* BOTONES DE TEMAS */
.btn-tema {
    width: 100%;
    padding: 14px 16px;
    background: var(--gris-claro);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: 0.25s ease;
    border-left: 3px solid transparent;
    font-size: 0.95rem;
}

.btn-tema:hover {
    background: #ffe8e7;
    transform: translateX(6px);
    border-left-color: var(--color-materia);
}

/* ===== CONTENIDO ===== */
.visor-contenido {
    flex: 1;
    padding: 50px;
    background-color: #f9f9fb;
    overflow-y: auto;
}

/* ===== PIZARRA ===== */
#pizarra {
    max-width: 900px;
    margin: 0 auto;
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== TITULO ===== */
#pizarra h2 {
    font-size: 2rem;
    color: var(--color-oscuro);
    margin-bottom: 15px;
    border-bottom: 3px solid var(--color-materia);
    display: inline-block;
    padding-bottom: 5px;
}

/* ===== TEXTO ===== */
#pizarra p {
    margin: 15px 0;
    line-height: 1.7;
    color: var(--texto-gris);
}

/* ===== LISTAS (IMPORTANTE PARA TUS TEMAS) ===== */
#pizarra ul {
    margin: 12px 0 20px 25px;
}

#pizarra ul li {
    margin-bottom: 8px;
    line-height: 1.6;
    color: #444;
}

/* ===== DESTACADOS ===== */
#pizarra b {
    color: var(--color-materia);
}

/* ===== BLOQUE EJEMPLO ===== */
.bloque-ejemplo {
    background: #fef0ef;
    border-left: 5px solid var(--color-materia);
    padding: 15px 20px;
    margin: 20px 0;
    border-radius: 8px;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 20px;
    background: white;
    border-top: 1px solid var(--gris-borde);
    color: #666;
    font-size: 0.9rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .contenedor-principal {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--gris-borde);
    }

    .visor-contenido {
        padding: 25px;
    }

    .titulo-app {
        font-size: 1.2rem;
    }
}
</style>
</head>
<body>

    <!-- NAVEGACIÓN: Puedes cambiar el enlace de "href" para que vuelva a la página correcta -->
    <nav class="nav-superior">
        <div class="volver"><a href="PanelGeneral.html">← REGRESAR</a></div>
        <div class="titulo-app">Academia CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <!-- MENÚ LATERAL: Aquí añades los botones para cada tema nuevo -->
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <!-- Para añadir un tema:
                     1. Copia la línea del botón.
                     2. Cambia el nombre (ej: "4. Nuevo Tema").
                     3. Cambia el ID en cargar('id_aqui'). Este ID debe ser igual al del Script abajo. -->
                <button class="btn-tema" onclick="cargar('tema1')">🟢 A1</button>
                <button class="btn-tema" onclick="cargar('tema2')">🔵 A2</button>
                <button class="btn-tema" onclick="cargar('tema3')">🟡 B1</button>
                <button class="btn-tema" onclick="cargar('tema4')">🟠 B2</button>
                <button class="btn-tema" onclick="cargar('tema5')">🔴 C1</button>
                <button class="btn-tema" onclick="cargar('tema6')">🟣 C2</button>
            </div>
        </aside>

        <!-- ÁREA DE LECTURA: Aquí es donde el JavaScript "dibuja" la información -->
        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un tema de la izquierda para visualizar el material de estudio.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED 
    </footer>

    <script>
        /**
         * FUNCIÓN CARGAR: Es la encargada de cambiar el texto de la pantalla.
         * @param {string} id - El identificador del tema que queremos mostrar.
         */
function cargar(id) {
    const pizarra = document.getElementById("pizarra");

    const baseDeDatos = {
        'tema1': {
            titulo: "A1 - Nivel Inicial",
            texto: `
            El nivel A1 es el punto de partida del aprendizaje del inglés dentro del Marco Común Europeo. En esta etapa el estudiante no tiene conocimientos previos o son muy limitados, por lo que el idioma se aprende desde cero. El objetivo principal es la comunicación básica en situaciones de supervivencia diaria, como presentarse, pedir información simple o entender instrucciones muy lentas y claras.

            En este nivel el estudiante depende mucho de frases memorizadas y vocabulario muy concreto. No se espera fluidez, sino reconocimiento y repetición de estructuras básicas.

            <br><br><b>Habilidades clave:</b>
            <ul>
                <li>Presentarse con nombre, edad, nacionalidad y ocupación</li>
                <li>Saludar, despedirse y usar expresiones básicas sociales</li>
                <li>Entender instrucciones muy simples y repetidas</li>
                <li>Responder preguntas personales básicas</li>
                <li>Identificar objetos cotidianos y colores</li>
            </ul>

            <b>Gramática:</b>
            <ul>
                <li>Verbo to be (am / is / are)</li>
                <li>Pronombres personales (I, you, he, she, it, we, they)</li>
                <li>Artículos (a / an / the)</li>
                <li>Presente simple en forma básica</li>
                <li>Preguntas simples (What is your name?)</li>
            </ul>

            <b>Qué puedes hacer en este nivel:</b>
            <ul>
                <li>Llenar formularios con datos personales</li>
                <li>Entender señales básicas y palabras aisladas</li>
                <li>Comunicar necesidades básicas en situaciones simples</li>
            </ul>
            `
        },

        'tema2': {
            titulo: "A2 - Nivel Básico",
            texto: `
            El nivel A2 representa una expansión del conocimiento básico del inglés. Aquí el estudiante ya puede comunicarse en situaciones cotidianas simples con frases más completas. Aunque todavía existen errores frecuentes, la comprensión y producción del idioma mejora notablemente.

            El usuario puede hablar de su vida diaria, rutinas, gustos y experiencias simples. La comunicación sigue siendo limitada, pero ya es funcional en contextos básicos como viajes o interacciones sociales simples.

            <br><br><b>Habilidades clave:</b>
            <ul>
                <li>Hablar de rutinas diarias y hábitos</li>
                <li>Describir personas, lugares y objetos</li>
                <li>Realizar compras básicas</li>
                <li>Pedir y dar información simple</li>
                <li>Hablar de gustos y preferencias</li>
            </ul>

            <b>Gramática:</b>
            <ul>
                <li>Presente simple</li>
                <li>Pasado simple básico</li>
                <li>There is / There are</li>
                <li>Preposiciones básicas (in, on, at)</li>
                <li>Preguntas con do / does</li>
            </ul>

            <b>Qué puedes hacer en este nivel:</b>
            <ul>
                <li>Desenvolverte en tiendas, transporte y situaciones simples</li>
                <li>Entender conversaciones lentas y claras</li>
                <li>Escribir mensajes cortos y simples</li>
            </ul>
            `
        },

        'tema3': {
            titulo: "B1 - Nivel Intermedio",
            texto: `
            El nivel B1 es un punto clave donde el estudiante empieza a usar el inglés de forma independiente. Ya puede comunicarse en la mayoría de situaciones cotidianas sin depender totalmente de ayuda externa.

            En este nivel la persona puede expresar ideas, experiencias, planes y opiniones con mayor claridad, aunque todavía con errores. Es un nivel funcional para viajar, estudiar o interactuar en entornos sociales básicos.

            <br><br><b>Habilidades clave:</b>
            <ul>
                <li>Contar experiencias personales y viajes</li>
                <li>Expresar opiniones y gustos</li>
                <li>Hablar de planes futuros</li>
                <li>Mantener conversaciones simples</li>
                <li>Describir situaciones pasadas</li>
            </ul>

            <b>Gramática:</b>
            <ul>
                <li>Past simple</li>
                <li>Present perfect básico</li>
                <li>Will / going to</li>
                <li>Comparativos y superlativos</li>
                <li>Conectores básicos (because, but, and)</li>
            </ul>

            <b>Qué puedes hacer en este nivel:</b>
            <ul>
                <li>Viajar y resolver situaciones comunes</li>
                <li>Entender ideas principales de textos simples</li>
                <li>Escribir textos básicos organizados</li>
            </ul>
            `
        },

        'tema4': {
            titulo: "B2 - Nivel Intermedio Alto",
            texto: `
            En el nivel B2 el usuario ya tiene un dominio sólido del idioma. Puede comunicarse con fluidez en la mayoría de situaciones y entender textos más complejos. También es capaz de debatir ideas y argumentar opiniones.

            Este nivel ya permite interactuar con hablantes nativos con cierta naturalidad y entender contenidos como películas, series o artículos sin demasiada dificultad.

            <br><br><b>Habilidades clave:</b>
            <ul>
                <li>Debatir y defender opiniones</li>
                <li>Entender películas y series sin subtítulos completos</li>
                <li>Escribir textos estructurados y detallados</li>
                <li>Participar en conversaciones fluidas</li>
                <li>Analizar información y argumentos</li>
            </ul>

            <b>Gramática:</b>
            <ul>
                <li>Passive voice</li>
                <li>Conditionals (0, 1st, 2nd, 3rd)</li>
                <li>Reported speech</li>
                <li>Present perfect avanzado</li>
                <li>Modales (must, should, might)</li>
            </ul>

            <b>Qué puedes hacer en este nivel:</b>
            <ul>
                <li>Estudiar o trabajar en inglés en contextos básicos</li>
                <li>Entender medios de comunicación en inglés</li>
                <li>Escribir ensayos simples</li>
            </ul>
            `
        },

        'tema5': {
            titulo: "C1 - Nivel Avanzado",
            texto: `
            El nivel C1 representa un dominio avanzado del inglés. El usuario puede expresarse con fluidez, precisión y naturalidad en contextos académicos, profesionales y sociales complejos.

            En este nivel el inglés se usa de forma flexible y efectiva, permitiendo comprender ideas implícitas, sarcasmo, humor y discursos rápidos sin dificultad.

            <br><br><b>Habilidades clave:</b>
            <ul>
                <li>Presentaciones profesionales y académicas</li>
                <li>Escritura avanzada y estructurada</li>
                <li>Análisis crítico de textos complejos</li>
                <li>Comprensión de ironía y sarcasmo</li>
                <li>Comunicación fluida en contextos formales</li>
            </ul>

            <b>Gramática:</b>
            <ul>
                <li>Estructuras complejas</li>
                <li>Inversiones gramaticales</li>
                <li>Mixed conditionals</li>
                <li>Passive avanzado</li>
                <li>Estilo formal e informal avanzado</li>
            </ul>

            <b>Qué puedes hacer en este nivel:</b>
            <ul>
                <li>Trabajar o estudiar en inglés sin problemas</li>
                <li>Participar en debates complejos</li>
                <li>Redactar textos profesionales</li>
            </ul>
            `
        },

        'tema6': {
            titulo: "C2 - Nivel Avanzado Superior",
            texto: `
            El nivel C2 es el nivel más alto del inglés. Representa un dominio casi nativo del idioma. El usuario puede entender absolutamente todo lo que escucha o lee, incluso en contextos técnicos, académicos o altamente abstractos.

            En este nivel el idioma se utiliza de forma natural, precisa y espontánea, con un dominio completo de matices, registros y estilos.

            <br><br><b>Habilidades clave:</b>
            <ul>
                <li>Comprensión total de cualquier texto o conversación</li>
                <li>Expresión espontánea, natural y precisa</li>
                <li>Uso de lenguaje técnico y académico avanzado</li>
                <li>Interpretación de matices y significados implícitos</li>
                <li>Adaptación a cualquier contexto comunicativo</li>
            </ul>

            <b>Gramática:</b>
            <ul>
                <li>Dominio completo de estructuras gramaticales</li>
                <li>Expresiones idiomáticas avanzadas</li>
                <li>Estilo formal e informal nativo</li>
                <li>Variaciones lingüísticas naturales</li>
                <li>Uso preciso del lenguaje en cualquier contexto</li>
            </ul>

            <b>Qué puedes hacer en este nivel:</b>
            <ul>
                <li>Trabajar como nativo en entornos profesionales</li>
                <li>Comprender cualquier acento o variante del inglés</li>
                <li>Escribir y hablar con precisión absoluta</li>
            </ul>
            `
        }
    };

    pizarra.innerHTML = `
        <h2>${baseDeDatos[id].titulo}</h2>
        <p>${baseDeDatos[id].texto}</p>
    `;
}
        
    </script>
</body>
</html> usen ese codigo base para los subtema de las materias
