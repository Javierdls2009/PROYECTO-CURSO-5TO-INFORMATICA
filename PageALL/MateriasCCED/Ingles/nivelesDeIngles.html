<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niveles de Inglés | AcademiaCCED</title>
    <link rel="stylesheet" href="/PageALL/style_materias.css">
    <style>
        :root {
            --color-materia: #e5322e;
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
            --gris-borde: #ddd;
            --gris-claro: #f0f0f0;
            --texto-gris: #555;
            --fondo-pizarra: #f9f9fb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Bloqueo de scroll en body para manejarlo internamente */
        html, body { 
            height: 100vh; 
            margin: 0; 
            font-family: Arial, sans-serif;
            background-color: var(--color-fondo); 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* ===== NAVBAR ===== */
        .nav-superior {
            display: flex;
            height: 74px;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--blanco);
            border-bottom: 2px solid var(--gris-borde);
            flex-shrink: 0;
            z-index: 1000;
        }

        .volver a {
            text-decoration: none;
            color: var(--color-materia);
            font-weight: bold;
            font-size: 1rem;
        }

        .titulo-app {
            font-weight: 800;
            color: var(--color-materia);
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .contenedor-principal {
            display: flex;
            flex: 1; /* Ocupa el espacio entre nav y footer */
            overflow: hidden;
            width: 100%;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 320px;
            background-color: var(--blanco);
            border-right: 1px solid var(--gris-borde);
            padding: 40px 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h3 {
            margin: 0 0 20px 0;
            color: var(--color-oscuro);
            font-size: 1.2rem;
            font-weight: bold;
            border-left: 4px solid var(--color-materia);
            padding-left: 12px;
        }

        .lista-temas {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-tema {
            width: 100%;
            padding: 14px 16px;
            background: var(--gris-claro);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.25s ease;
            font-size: 0.95rem;
            color: #333;
            border-left: 3px solid transparent;
        }

        .btn-tema:hover {
            background: #ffe8e7;
            transform: translateX(6px);
            border-left-color: var(--color-materia);
        }

        /* ===== VISOR DE CONTENIDO (CORRECCIÓN DE SCROLL Y ESPACIO BLANCO) ===== */
        .visor-contenido {
            flex: 1;
            background-color: var(--fondo-pizarra);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100%;
        }

        #pizarra {
            flex: 1 0 auto; /* Empuja al footer hacia abajo */
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 50px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #pizarra h2 {
            font-size: 2rem;
            color: var(--color-oscuro);
            margin-bottom: 15px;
            border-bottom: 3px solid var(--color-materia);
            display: inline-block;
            padding-bottom: 5px;
        }

        #pizarra p {
            margin: 15px 0;
            line-height: 1.7;
            color: var(--texto-gris);
            font-size: 1.05rem;
        }

        #pizarra ul { margin: 15px 0 20px 25px; }
        #pizarra ul li { margin-bottom: 8px; line-height: 1.6; color: #444; }
        #pizarra b { color: var(--color-materia); }

        /* ===== FOOTER DENTRO DEL FLUJO ===== */
        footer {
            flex-shrink: 0;
            text-align: center;
            padding: 20px;
            background: white;
            border-top: 1px solid var(--gris-borde);
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            html, body { overflow: auto; }
            .contenedor-principal { flex-direction: column; height: auto; }
            .sidebar { width: 100%; border-right: none; height: auto; border-bottom: 1px solid var(--gris-borde); }
            .visor-contenido { height: auto; }
        }
    </style>
</head>
<body>

    <nav class="nav-superior">
        <div class="volver"><a href="PanelGeneral.html">← REGRESAR</a></div>
        <div class="titulo-app">Academia CCED</div>
        <div style="font-weight: 600; color: #888;">Niveles de Inglés</div>
    </nav>

    <div class="contenedor-principal">
        
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <button class="btn-tema" onclick="cargar('tema1')">🟢 A1 - Inicial</button>
                <button class="btn-tema" onclick="cargar('tema2')">🔵 A2 - Básico</button>
                <button class="btn-tema" onclick="cargar('tema3')">🟡 B1 - Intermedio</button>
                <button class="btn-tema" onclick="cargar('tema4')">🟠 B2 - Intermedio Alto</button>
                <button class="btn-tema" onclick="cargar('tema5')">🔴 C1 - Avanzado</button>
                <button class="btn-tema" onclick="cargar('tema6')">🟣 C2 - Maestría</button>
            </div>
        </aside>

        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un nivel de la izquierda para visualizar las competencias, gramática y habilidades requeridas según el Marco Común Europeo.</p>
            </div>

            <footer>
                &copy; 2026 AcademiaCCED 
            </footer>
        </main>

    </div>

    <script>
    function cargar(id) {
        const pizarra = document.getElementById("pizarra");
        const visor = document.querySelector(".visor-contenido");

        const baseDeDatos = {
            'tema1': {
                titulo: "A1 - Nivel Inicial",
                texto: `
                El nivel A1 es el punto de partida del aprendizaje del inglés dentro del Marco Común Europeo. Es una etapa de inmersión inicial donde el objetivo es la comunicación básica de supervivencia.
                <br><br><b>Habilidades clave:</b>
                <ul>
                    <li>Presentarse con nombre, edad y ocupación.</li>
                    <li>Saludar y despedirse formal e informalmente.</li>
                    <li>Entender instrucciones lentas y claras.</li>
                    <li>Identificar objetos cotidianos y colores básicos.</li>
                </ul>
                <b>Gramática:</b>
                <ul>
                    <li>Verbo <b>to be</b> (am/is/are).</li>
                    <li>Pronombres personales y artículos básicos.</li>
                    <li>Presente simple en su forma más elemental.</li>
                </ul>`
            },
            'tema2': {
                titulo: "A2 - Nivel Básico",
                texto: `
                El nivel A2 representa una expansión funcional. El estudiante puede comunicarse en situaciones cotidianas simples con frases más completas.
                <br><br><b>Habilidades clave:</b>
                <ul>
                    <li>Hablar de rutinas diarias y hábitos.</li>
                    <li>Describir personas, lugares y objetos en detalle simple.</li>
                    <li>Realizar transacciones básicas (compras, pedidos).</li>
                </ul>
                <b>Gramática:</b>
                <ul>
                    <li>Presente simple vs continuo.</li>
                    <li>Pasado simple básico.</li>
                    <li>Preposiciones de lugar y tiempo (in, on, at).</li>
                </ul>`
            },
            'tema3': {
                titulo: "B1 - Nivel Intermedio",
                texto: `
                El nivel B1 es el umbral de la independencia. El estudiante puede manejarse en la mayoría de las situaciones que surgen al viajar por zonas de habla inglesa.
                <br><br><b>Habilidades clave:</b>
                <ul>
                    <li>Contar experiencias, sueños y ambiciones.</li>
                    <li>Mantener conversaciones sobre temas familiares o de interés personal.</li>
                    <li>Explicar brevemente planes y opiniones.</li>
                </ul>
                <b>Gramática:</b>
                <ul>
                    <li>Present Perfect simple.</li>
                    <li>Comparativos y superlativos.</li>
                    <li>Primer condicional y uso de modales (can, should, must).</li>
                </ul>`
            },
            'tema4': {
                titulo: "B2 - Nivel Intermedio Alto",
                texto: `
                En el nivel B2 el usuario tiene un dominio sólido. Puede interactuar con hablantes nativos con un grado suficiente de fluidez y naturalidad.
                <br><br><b>Habilidades clave:</b>
                <ul>
                    <li>Entender ideas principales de textos complejos y debates técnicos.</li>
                    <li>Argumentar y defender puntos de vista sobre temas generales.</li>
                    <li>Redactar textos detallados sobre diversos temas.</li>
                </ul>
                <b>Gramática:</b>
                <ul>
                    <li>Voz pasiva y estilo indirecto (Reported Speech).</li>
                    <li>Segundo y tercer condicional.</li>
                    <li>Phrasal Verbs avanzados.</li>
                </ul>`
            },
            'tema5': {
                titulo: "C1 - Nivel Avanzado",
                texto: `
                El nivel C1 es un dominio competente. Permite el uso flexible y eficaz del idioma para fines sociales, académicos y profesionales.
                <br><br><b>Habilidades clave:</b>
                <ul>
                    <li>Comprender una amplia variedad de textos extensos y con nivel de exigencia.</li>
                    <li>Expresarse de forma fluida y espontánea sin muestras muy evidentes de esfuerzo.</li>
                    <li>Reconocer significados implícitos, ironía y sarcasmo.</li>
                </ul>
                <b>Gramática:</b>
                <ul>
                    <li>Inversiones gramaticales para énfasis.</li>
                    <li>Estructuras complejas de modales pasados.</li>
                    <li>Conectores avanzados para cohesión textual.</li>
                </ul>`
            },
            'tema6': {
                titulo: "C2 - Nivel Avanzado Superior",
                texto: `
                El nivel C2 representa la maestría absoluta. El usuario entiende con facilidad prácticamente todo lo que oye o lee.
                <br><br><b>Habilidades clave:</b>
                <ul>
                    <li>Resumir información de fuentes diversas, reconstruyendo argumentos y cuentas en una presentación coherente.</li>
                    <li>Diferenciar matices sutiles de significado incluso en situaciones de alta complejidad.</li>
                    <li>Dominio nativo de expresiones idiomáticas y jergas profesionales.</li>
                </ul>`
            }
        };

        const info = baseDeDatos[id];
        if (info) {
            pizarra.innerHTML = `
                <h2>${info.titulo}</h2>
                <p>${info.texto}</p>
            `;
            visor.scrollTop = 0; // Regresa el scroll arriba al cambiar tema
        }
    }
    </script>
</body>
</html>
