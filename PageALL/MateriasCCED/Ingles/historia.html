<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia del Inglés | AcademiaCCED</title>    
    <style>
        :root {
            --color-materia: #e5312e; 
            --color-fondo: #f3f6ff;
            --color-oscuro: #1a1a2e;
            --blanco: #ffffff;
            --gris-borde: #ddd;
            --gris-claro: #f0f0f0;
            --texto-gris: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--color-fondo);
            color: #333;
        }

        /* ===== BARRA SUPERIOR ===== */
        .nav-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--blanco);
            border-bottom: 2px solid var(--gris-borde);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }

        .volver a {
            text-decoration: none;
            color: var(--color-materia);
            font-weight: bold;
            font-size: 1rem;
        }

        .titulo-app {
            font-weight: 800;
            color: var(--color-materia);
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .contenedor-principal {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 320px;
            background-color: var(--blanco);
            border-right: 1px solid var(--gris-borde);
            padding: 40px 20px;
            flex-shrink: 0;
        }

        .sidebar h3 {
            margin: 0 0 20px 0;
            color: var(--color-oscuro);
            font-size: 1.2rem;
            font-weight: bold;
            border-left: 4px solid var(--color-materia);
            padding-left: 12px;
        }

        .lista-temas {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ===== BOTONES ===== */
        .btn-tema {
            width: 100%;
            padding: 12px 15px;
            background: var(--gris-claro);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: 0.25s;
            font-size: 0.95rem;
            color: #333;
            border-left: 3px solid transparent;
        }

        .btn-tema:hover {
            background: #ffe8e7;
            transform: translateX(4px);
            border-left-color: var(--color-materia);
            color: #000;
        }

        /* ===== ÁREA DE CONTENIDO ===== */
        .visor-contenido {
            flex: 1;
            padding: 50px;
            background-color: #f9f9fb;
        }

        /* ===== PIZARRA ===== */
        #pizarra {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #pizarra h2 {
            font-size: 2rem;
            color: var(--color-oscuro);
            margin-bottom: 15px;
            border-bottom: 3px solid var(--color-materia);
            display: inline-block;
            padding-bottom: 5px;
        }

        #pizarra p {
            margin: 15px 0;
            line-height: 1.7;
            color: var(--texto-gris);
            font-size: 1rem;
        }

        /* Estilo exclusivo para los títulos de categoría (rojo) */
        .cat-rojo {
            color: var(--color-materia);
            font-weight: bold;
        }

        /* El resto del texto (incluso negritas sin clase) conserva color normal */
        #pizarra b:not(.cat-rojo) {
            color: inherit;
        }

        /* ===== BLOQUES DESTACADOS ===== */
        .bloque-ejemplo {
            background: #fef0ef;
            border-left: 5px solid var(--color-materia);
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 8px;
            color: #2d2d2d;
        }

        hr {
            margin: 20px 0;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, var(--color-materia), transparent);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 20px;
            background: white;
            border-top: 1px solid var(--gris-borde);
            color: #666;
            font-size: 0.9rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .contenedor-principal {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--gris-borde);
            }

            .visor-contenido {
                padding: 25px;
            }

            .titulo-app {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-superior">
        <div class="volver"><a href="PanelGeneral.html">← REGRESAR</a></div>
        <div class="titulo-app">Academia CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <button class="btn-tema" onclick="cargar('tema1')">⌛ Historia</button>
                <button class="btn-tema" onclick="cargar('tema2')">⚒ Ingles antiguo</button>
                <button class="btn-tema" onclick="cargar('tema3')">◈ Ingles Medio</button>
                <button class="btn-tema" onclick="cargar('tema4')">✦ Ingles Moderno</button>
            </div>
        </aside>

        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un tema de la izquierda para visualizar el material de estudio.</p>
            </div>
        </main>
    </div>

    <footer>
        &copy; 2026 AcademiaCCED - Desarrollado por Javier de los Santos
    </footer>

    <script>
        function cargar(id) {
            const pizarra = document.getElementById("pizarra");

            const baseDeDatos = {
                'tema1': {
                    titulo: "Historia del Inglés",
                    texto: `El inglés es una lengua germánica occidental que ha evolucionado durante más de 1.500 años, absorbiendo influencias de invasiones, conquistas, la Iglesia, el Renacimiento, la imprenta y la globalización.<br><br>Hoy es el idioma más hablado del mundo como segunda lengua y uno de los más importantes en ciencia, tecnología, negocios y cultura.<br><br>
                    <b class="cat-rojo">Etapas principales del inglés</b><br>
                    Los lingüistas suelen dividir su historia en tres grandes periodos (aunque a veces se subdividen en cuatro):<br><br>
                    <b class="cat-rojo">1. Inglés Antiguo (Old English o anglosajón):</b> Siglos V-XI/XII (aprox. 450-1150 d.C.)<br>
                    <b class="cat-rojo">2. Inglés Medio (Middle English):</b> Siglos XII-XV (aprox. 1150-1500 d.C.)<br>
                    <b class="cat-rojo">3. Inglés Moderno:</b> Desde el siglo XVI hasta hoy, subdividido en:<br>
                    &nbsp;&nbsp;&nbsp;• Inglés Moderno Temprano (Early Modern English, aprox. 1500-1800)<br>
                    &nbsp;&nbsp;&nbsp;• Inglés Moderno Tardío o Contemporáneo (desde el siglo XIX)`
                },
                'tema2': {
                    titulo: "Inglés Antiguo (siglos V-XII)",
                    texto: `El inglés nace alrededor del año 449 d.C. con la llegada a Britania (la actual Gran Bretaña) de tres tribus germánicas procedentes del norte de Alemania, Dinamarca y los Países Bajos: anglos, sajones y jutos. Estos pueblos desplazaron o asimilaron a los britanos celtas que habitaban la isla (quienes hablaban lenguas celtas, con influencia limitada en el inglés actual, principalmente en topónimos como London o Dover).<br>
                    - El núcleo del idioma era germánico (relacionado con el antiguo frisio y bajo alemán).<br><br>
                    <b class="cat-rojo">Influencias tempranas:</b><br><br>
                    <b class="cat-rojo">• Latín:</b> Por el contacto con el Imperio Romano (antes de la llegada de los germanos) y, sobre todo, por la cristianización a partir del siglo VI (palabras como church, bishop, angel).<br><br>
                    <b class="cat-rojo">• Nórdico antiguo:</b> Por las invasiones vikingas (siglos VIII-IX), que dejaron palabras como sky, egg, they, are y simplificaron algo la gramática.<br><br>
                    <b class="cat-rojo">Características del inglés antiguo:</b><br>
                    Gramática compleja con muchas declinaciones (casos), géneros gramaticales y flexiones. La pronunciación y el vocabulario eran muy diferentes al actual.<br><br>
                    <b class="cat-rojo">Ejemplo famoso:</b> el poema épico Beowulf está escrito en inglés antiguo y resulta casi incomprensible para un hablante moderno sin estudio.<br><br>
                    <b class="cat-rojo">El dialecto más influyente fue el sajón occidental</b><br>
                    En esta etapa, el inglés era una lengua puramente germánica, con unas 85.000 palabras estimadas, muchas de las cuales aún sobreviven en formas básicas (house, man, water, love).`
                },
                'tema3': {
                    titulo: "Inglés Medio (siglos XII-XV)",
                    texto: `El gran punto de inflexión fue la <b class="cat-rojo">Conquista Normanda de 1066</b>, cuando Guillermo el Conquistador (duque de Normandía) invadió Inglaterra. Los normandos hablaban un dialecto de francés antiguo (anglonormando), que se convirtió en la lengua de la corte, el gobierno, la ley y la nobleza durante casi tres siglos. El inglés quedó relegado a las clases bajas, pero sobrevivió y se transformó.<br><br>
                    <b class="cat-rojo">Influencia masiva del francés normando:</b> Aportó miles de palabras relacionadas con poder, comida, derecho y cultura (ejemplos: government, justice, court, beef, pork, art, beauty, parliament). El vocabulario inglés se duplicó o triplicó.<br><br>
                    <b class="cat-rojo">Simplificación gramatical:</b> Se perdieron muchas declinaciones y el sistema de casos se redujo drásticamente. Apareció el orden de palabras más fijo (sujeto-verbo-objeto).<br><br>
                    <b class="cat-rojo">Otras influencias:</b> Continuó el latín (lengua de la Iglesia) y algo de nórdico.<br><br>
                    <b class="cat-rojo">Obras clave:</b> Los Cuentos de Canterbury de Geoffrey Chaucer (finales del siglo XIV), escrito en un inglés medio del dialecto de Londres (East Midlands), que ya se parece más al inglés actual.<br><br>
                    En esta época el inglés estuvo a punto de desaparecer como lengua de prestigio, pero resurgió con fuerza. Hacia el siglo XIV, el inglés volvió a usarse en tribunales y administración.`
                },
                'tema4': {
                    titulo: "Inglés Moderno (desde el siglo XVI)",
                    texto: `<b class="cat-rojo">La transición al inglés moderno temprano se marcó por dos eventos clave:</b><br>
                    • La invención de la imprenta por William Caxton en 1476, que estandarizó la ortografía y difundió el dialecto de Londres.<br>
                    • <b class="cat-rojo">El Great Vowel Shift (Gran Cambio Vocálico, siglos XV-XVII):</b> Un cambio masivo en la pronunciación de las vocales largas que explica por qué el inglés actual se pronuncia de forma tan diferente a como se escribe (ej.: name se pronunciaba antes más como "nah-meh").<br><br>
                    <b class="cat-rojo">Características del inglés moderno temprano:</b><br>
                    • Vocabulario enriquecido por el Renacimiento: Préstamos masivos del latín y griego clásico (ciencia, filosofía: education, science, philosophy, biology).<br>
                    • <b class="cat-rojo">Literatura dorada:</b> William Shakespeare (siglo XVI-XVII) escribió en esta variedad. La Biblia del Rey Jacobo (1611) también ayudó a estandarizarla.<br>
                    • <b class="cat-rojo">Primer diccionario:</b> Table Alphabeticall (1604), seguido del famoso de Samuel Johnson (1755).<br><br>
                    <b class="cat-rojo">En el inglés moderno tardío (siglo XVIII en adelante):</b><br>
                    • La Revolución Industrial y el Imperio Británico (que llegó a controlar un cuarto del mundo) incorporaron palabras de todo el planeta: del hindi (jungle, pajamas), español (alligator, canyon), árabe, chino, lenguas indígenas americanas, etc.<br>
                    • <b class="cat-rojo">Colonización:</b> El inglés se extendió a Norteamérica, Australia, India, África y el Caribe, dando lugar a variedades (American English, Indian English, etc.).<br>
                    • <b class="cat-rojo">Estandarización:</b> Diccionarios, gramáticas y escuelas fijaron reglas, aunque el idioma sigue evolucionando rápidamente.<br><br>
                    <b class="cat-rojo">El inglés actual:</b> una lengua global e híbrida.<br>
                    • Préstamos de decenas de lenguas más (griego, nórdico, etc.).<br>
                    Tiene alrededor de 170.000 palabras en uso común (y cientos de miles más en total), lo que lo hace muy rico y flexible. Su gramática es relativamente simple comparada con otras lenguas europeas, lo que facilitó su adopción global.<br>
                    En el siglo XXI, el inglés sigue cambiando por internet, redes sociales, tecnología (nuevas palabras como selfie, emoji, googling) y el contacto con otras lenguas. Existen variedades nativas (británico, americano, australiano) y no nativas (como el "Globish" o inglés internacional simplificado).`
                }
            };

            const info = baseDeDatos[id];
            if (info) {
                pizarra.innerHTML = `
                    <h2>${info.titulo}</h2>
                    <p>${info.texto}</p>
                `;
            }
        }
    </script>
</body>
</html>
