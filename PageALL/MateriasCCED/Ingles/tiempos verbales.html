<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TITULO DE LA PESTAÑA: Cámbialo por el nombre de la materia -->
    <title>Ingles | AcademiaCCED</title>
    
  <style>
    :root {
        --color-materia: #e5322e;
        --color-fondo: #f3f6ff;
        --color-oscuro: #1a1a2e;
        --blanco: #ffffff;
        --gris-borde: #ddd;
        --gris-claro: #f0f0f0;
        --texto-gris: #555;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: var(--color-fondo);
        color: #333;
    }

    /* ===== NAVBAR ===== */
    .nav-superior {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 5%;
        background: var(--blanco);
        border-bottom: 2px solid var(--gris-borde);
        position: sticky;
        top: 0;
        z-index: 1000;
        flex-wrap: wrap;
    }

    .volver a {
        text-decoration: none;
        color: var(--color-materia);
        font-weight: bold;
        font-size: 1rem;
    }

    .titulo-app {
        font-weight: 800;
        color: var(--color-materia);
        font-size: 1.5rem;
        text-transform: uppercase;
    }

    /* ===== CONTENEDOR ===== */
    .contenedor-principal {
        display: flex;
        min-height: calc(100vh - 70px);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
        width: 320px;
        background-color: var(--blanco);
        border-right: 1px solid var(--gris-borde);
        padding: 40px 20px;
        flex-shrink: 0;
    }

    .sidebar h3 {
        margin: 0 0 20px 0;
        color: var(--color-oscuro);
        font-size: 1.2rem;
        font-weight: bold;
        border-left: 4px solid var(--color-materia);
        padding-left: 12px;
    }

    .lista-temas {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    /* ===== BOTONES ===== */
    .btn-tema {
        width: 100%;
        padding: 12px 15px;
        background: var(--gris-claro);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-align: left;
        transition: 0.25s ease;
        font-size: 0.95rem;
        color: #333;
        border-left: 3px solid transparent;
    }

    .btn-tema:hover {
        background: #ffe8e7;
        transform: translateX(4px);
        border-left-color: var(--color-materia);
        color: #000;
    }

    /* ===== CONTENIDO ===== */
    .visor-contenido {
        flex: 1;
        padding: 50px;
        background-color: #f9f9fb;
        overflow-y: auto;
    }

    /* ===== PIZARRA ===== */
    #pizarra {
        max-width: 900px;
        margin: 0 auto;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    #pizarra h2 {
        font-size: 2rem;
        color: var(--color-oscuro);
        margin-bottom: 15px;
        border-bottom: 3px solid var(--color-materia);
        display: inline-block;
        padding-bottom: 5px;
    }

    #pizarra p {
        margin: 15px 0;
        line-height: 1.7;
        color: var(--texto-gris);
        font-size: 1rem;
    }

    #pizarra b {
        color: var(--color-oscuro);
    }

    /* ===== BLOQUES DESTACADOS ===== */
    .bloque-ejemplo {
        background: #fef0ef;
        border-left: 5px solid var(--color-materia);
        padding: 15px 20px;
        margin: 20px 0;
        border-radius: 8px;
        color: #2d2d2d;
    }

    hr {
        margin: 20px 0;
        border: 0;
        height: 1px;
        background: linear-gradient(to right, var(--color-materia), transparent);
    }

    /* ===== FOOTER ===== */
    footer {
        text-align: center;
        padding: 20px;
        background: white;
        border-top: 1px solid var(--gris-borde);
        color: #666;
        font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {

        .contenedor-principal {
            flex-direction: column;
        }

        .sidebar {
            width: 100%;
            border-right: none;
            border-bottom: 1px solid var(--gris-borde);
        }

        .visor-contenido {
            padding: 25px;
        }

        .titulo-app {
            font-size: 1.2rem;
        }
    }
    #pizarra b {
    color: #e5322e;
}
    
</style>
</head>
<body>

    <!-- NAVEGACIÓN: Puedes cambiar el enlace de "href" para que vuelva a la página correcta -->
    <nav class="nav-superior">
        <div class="volver"><a href="PanelGeneral.html">← REGRESAR</a></div>
        <div class="titulo-app">Academia CCED</div>
        <div style="font-weight: 600; color: #888;">Panel Educativo</div>
    </nav>

    <div class="contenedor-principal">
        
        <!-- MENÚ LATERAL: Aquí añades los botones para cada tema nuevo -->
        <aside class="sidebar">
            <h3>TEMARIO</h3>
            <div class="lista-temas">
                <!-- Para añadir un tema:
                     1. Copia la línea del botón.
                     2. Cambia el nombre (ej: "4. Nuevo Tema").
                     3. Cambia el ID en cargar('id_aqui'). Este ID debe ser igual al del Script abajo. -->
            <button class="btn-tema" onclick="cargar('tema1')">⏳ Tiempos verbales</button>
<button class="btn-tema" onclick="cargar('tema2')">🟢 Presente</button>
<button class="btn-tema" onclick="cargar('tema3')">⏪ Pasado</button>
<button class="btn-tema" onclick="cargar('tema4')">⏩ Futuro</button>

            </div>
        </aside>

        <!-- ÁREA DE LECTURA: Aquí es donde el JavaScript "dibuja" la información -->
        <main class="visor-contenido">
            <div id="pizarra">
                <h2>Bienvenido</h2>
                <p>Selecciona un tema de la izquierda para visualizar el material de estudio.</p>
            </div>
        </main>

    </div>

    <footer>
        &copy; 2026 AcademiaCCED - Desarrollado por Javier de los Santos
    </footer>

  <script>
/**
 * FUNCIÓN CARGAR: Es la encargada de cambiar el texto de la pantalla.
 * @param {string} id - El identificador del tema que queremos mostrar.
 */
function cargar(id) {
    const pizarra = document.getElementById("pizarra");

    /* BASE DE DATOS: Aquí guardas toda la información de la materia. */
    const baseDeDatos = {
        'tema1': {
            titulo: `Tiempos Verbales`,
            texto: `
            <b>¿Qué son los tiempos verbales?</b><br>
            Son las formas que usamos para expresar cuándo ocurre una acción: presente, pasado o futuro.
            En inglés existen 12 tiempos principales, combinando tiempo + aspecto (simple, continuo, perfecto y perfecto continuo).
            <br><br>

            <b>Palabras clave generales:</b> always, yesterday, tomorrow, already, just, since, for.
            <br><br>

            <b>Idea clave:</b> Piensa en ellos como “modos de tiempo” que cambian el significado del verbo según cuándo y cómo ocurre la acción.
            `
        },

        'tema2': {
            titulo: "Presente",
            texto: `
            <b>Uso general:</b> hábitos, rutinas, verdades generales y acciones actuales.<br><br>

            <b>- Present Simple</b><br>
            <b>Uso:</b> hábitos, rutinas, hechos.<br>
            <b>Fórmula:</b> Sujeto + verbo (he/she/it añade -s/-es).<br>
            <b>Ejemplo:</b> I eat pizza every Friday.<br>
            <b>Palabras clave:</b> always, usually, every day.<br><br>

            <b>- Present Continuous</b><br>
            <b>Uso:</b> acciones en este momento.<br>
            <b>Fórmula:</b> Sujeto + am/is/are + verbo-ing.<br>
            <b>Ejemplo:</b> She is studying English right now.<br>
            <b>Palabras clave:</b> now, right now, at the moment.<br><br>

            <b>- Present Perfect</b><br>
            <b>Uso:</b> acciones terminadas con efecto en el presente.<br>
            <b>Fórmula:</b> Sujeto + have/has + participio pasado.<br>
            <b>Ejemplo:</b> We have visited Paris three times.<br>
            <b>Palabras clave:</b> already, just, ever, never.<br><br>

            <b>- Present Perfect Continuous</b><br>
            <b>Uso:</b> duración de una acción hasta ahora.<br>
            <b>Fórmula:</b> Sujeto + have/has been + verbo-ing.<br>
            <b>Ejemplo:</b> I have been waiting for two hours.<br>
            <b>Palabras clave:</b> for, since, how long.
            `
        },

        'tema3': {
            titulo: "Pasado",
            texto: `
            <b>Uso general:</b> acciones que ya terminaron.<br><br>

            <b>- Past Simple</b><br>
            <b>Uso:</b> acciones terminadas en el pasado.<br>
            <b>Fórmula:</b> Sujeto + verbo en pasado (regular o irregular).<br>
            <b>Ejemplo:</b> They played soccer yesterday.<br>
            <b>Palabras clave:</b> yesterday, ago, last week.<br><br>

            <b>- Past Continuous</b><br>
            <b>Uso:</b> acción en progreso en el pasado.<br>
            <b>Fórmula:</b> Sujeto + was/were + verbo-ing.<br>
            <b>Ejemplo:</b> I was watching TV when you called.<br><br>

            <b>- Past Perfect</b><br>
            <b>Uso:</b> acción anterior a otra del pasado.<br>
            <b>Fórmula:</b> Sujeto + had + participio pasado.<br>
            <b>Ejemplo:</b> She had finished before dinner.<br><br>

            <b>- Past Perfect Continuous</b><br>
            <b>Uso:</b> duración antes de un evento pasado.<br>
            <b>Fórmula:</b> Sujeto + had been + verbo-ing.<br>
            <b>Ejemplo:</b> He had been running before he got tired.
            `
        },

        'tema4': {
            titulo: "Futuro",
            texto: `
            <b>Uso general:</b> acciones que van a ocurrir.<br><br>

            <b>- Future Simple</b><br>
            <b>Uso:</b> decisiones espontáneas o predicciones.<br>
            <b>Fórmula:</b> Sujeto + will + verbo.<br>
            <b>Ejemplo:</b> It will rain tomorrow.<br><br>

            <b>- Future Continuous</b><br>
            <b>Uso:</b> acción en progreso en el futuro.<br>
            <b>Fórmula:</b> Sujeto + will be + verbo-ing.<br>
            <b>Ejemplo:</b> We will be traveling at 5 PM.<br><br>

            <b>- Future Perfect</b><br>
            <b>Uso:</b> acción completada antes de un punto futuro.<br>
            <b>Fórmula:</b> Sujeto + will have + participio pasado.<br>
            <b>Ejemplo:</b> I will have learned English by 2030.<br><br>

            <b>- Future Perfect Continuous</b><br>
            <b>Uso:</b> duración hasta un punto futuro.<br>
            <b>Fórmula:</b> Sujeto + will have been + verbo-ing.<br>
            <b>Ejemplo:</b> She will have been living here for 10 years.
            `
        }
    };

    const info = baseDeDatos[id];

    if (info) {
        pizarra.innerHTML = `
            <h2>${info.titulo}</h2>
            <p>${info.texto}</p>
        `;
    }
}

    </script>
</body>
</html> usen ese codigo base para los subtema de las materias
