<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Ecuaciones | AcademiaOS</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .work-area {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input { width: 80%; padding: 15px; margin: 10px; font-size: 1.2rem; border: 1px solid #ddd; border-radius: 8px; }
        .btn-calc { background: var(--mate-color); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav style="padding: 20px;"><a href="../index.html">← Volver</a></nav>
    
    <div class="work-area">
        <h1>Ecuación Lineal</h1>
        <p>Ingresa los valores para <b>ax + b = 0</b></p>
        <input type="number" id="a" placeholder="Valor de a">
        <input type="number" id="b" placeholder="Valor de b">
        <br>
        <button class="btn-calc" onclick="resolver()">Resolver x</button>
        <h2 id="resultado"></h2>
    </div>

    <script>
        function resolver() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            if(a !== 0) {
                const x = -b / a;
                document.getElementById('resultado').innerText = "x = " + x.toFixed(2);
            } else {
                alert(" 'a' no puede ser cero.");
            }
        }
    </script>
</body>
</html>
